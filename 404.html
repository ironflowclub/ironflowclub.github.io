<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Page Not Found | IRONFLOW CLUB</title>
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0b0d1a 0%, #1c1f3a 100%);
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    .wrap {
      max-width: 500px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 20px;
      border: 2px solid rgba(255,193,7,.3);
      object-fit: cover;
    }

    h1 {
      font-size: clamp(80px, 20vw, 140px);
      font-weight: 800;
      margin: 0 0 16px;
      background: linear-gradient(135deg, #ffc107, #ff9800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    p {
      font-size: 18px;
      margin: 0 0 32px;
      opacity: 0.8;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 16px 32px;
      background: #ffc107;
      color: #000;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 30px rgba(255,193,7,.3);
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(255,193,7,.4);
    }

    a:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="/assets/images/logo.jpg" alt="IRONFLOW CLUB" width="80" height="80">
    <h1>404</h1>
    <p>This page doesn't exist.<br>Keep running forward.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
