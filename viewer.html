<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IRONFLOW · Badminton Tournament</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}

:root{
  --bg:#f5f4f0;
  --surface:#ffffff;
  --surface2:#f0f0f0;
  --ink:#11141c;
  --ink2:rgba(17,20,28,.62);
  --ink3:rgba(17,20,28,.40);
  --gold:#ffc107;
  --gold2:#d48d12;
  --green:#34c759;
  --green-dim:rgba(52,199,89,.10);
  --red:#ff3b30;
  --red-dim:rgba(255,59,48,.08);
  --stroke:rgba(17,20,28,.08);
  --stroke2:rgba(17,20,28,.14);
  --ff:'Outfit',sans-serif;
  --fb:'Inter',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --nav-h:60px;
  --pad:16px;
  --max:720px;
}

body{
  font-family:var(--fb);
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── NAV ── */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(245,244,240,.92);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--stroke);
}
.nav{
  max-width:var(--max);
  margin:0 auto;
  padding:0 var(--pad);
  height:var(--nav-h);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.brand-icon{
  width:36px;height:36px;border-radius:10px;
  overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
}
.brand-icon img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-text strong{
  display:block;font-family:var(--ff);font-size:15px;
  font-weight:800;color:var(--ink);letter-spacing:.02em;
}
.brand-text small{
  display:block;font-size:10px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);
}
.back-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:8px;
  border:1px solid var(--stroke2);background:var(--surface);
  color:var(--ink2);font-family:var(--fb);font-size:12px;font-weight:600;
  text-decoration:none;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.back-btn:hover{background:var(--surface2);}
.back-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ── HERO ── */
.hero{
  max-width:var(--max);
  margin:0 auto;
  padding:28px var(--pad) 0;
}
.hero-kicker{
  font-size:11px;letter-spacing:.3em;text-transform:uppercase;
  font-weight:700;color:var(--gold2);margin-bottom:8px;
}
.hero-title{
  font-family:var(--ff);font-size:clamp(28px,7vw,40px);
  font-weight:800;letter-spacing:-.02em;color:var(--ink);
  line-height:1.05;margin-bottom:16px;
}

/* ── LIVE PILL ── */
.live-pill{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:100px;
  background:var(--surface);border:1px solid var(--stroke);
  font-size:12px;font-weight:600;color:var(--ink2);
  margin-bottom:20px;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  animation:pulse 2s ease infinite;
}
.live-pill.done .live-dot{background:var(--gold);animation:none;}
.live-pill.done{color:var(--gold2);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CHAMP CARD ── */
.champ-card{
  max-width:var(--max);
  margin:0 auto 20px;
  padding:0 var(--pad);
}
.champ-inner{
  background:linear-gradient(135deg,#11141c,#1e2230);
  border-radius:20px;
  padding:28px 24px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.champ-inner::before{
  content:'';position:absolute;
  top:-40px;left:50%;transform:translateX(-50%);
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,193,7,.15),transparent 70%);
}
.champ-trophy{font-size:40px;margin-bottom:10px;display:block;}
.champ-label{
  font-size:10px;letter-spacing:.25em;text-transform:uppercase;
  font-weight:700;color:rgba(255,193,7,.7);margin-bottom:8px;
}
.champ-name{
  font-family:var(--ff);font-size:30px;font-weight:800;
  color:#fff;letter-spacing:-.02em;margin-bottom:6px;
}
.champ-meta{
  font-size:13px;color:rgba(255,255,255,.45);font-weight:500;
}
.champ-stats-row{
  display:flex;justify-content:center;gap:24px;
  margin-top:18px;padding-top:18px;
  border-top:1px solid rgba(255,255,255,.08);
}
.champ-stat{text-align:center;}
.champ-stat-val{
  font-family:var(--ff);font-size:20px;font-weight:700;
  color:#fff;display:block;line-height:1;
}
.champ-stat-lbl{
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.4);font-weight:600;margin-top:4px;display:block;
}

/* ── TABS ── */
.tabs-wrap{
  max-width:var(--max);
  margin:0 auto;
  padding:0 var(--pad);
  position:sticky;
  top:var(--nav-h);
  z-index:40;
  background:var(--bg);
  padding-top:12px;
  padding-bottom:10px;
}
.tab-bar{
  display:flex;gap:2px;padding:4px;
  background:var(--surface);border:1px solid var(--stroke);
  border-radius:12px;
}
.tab{
  flex:1;height:40px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;border:none;background:transparent;
  color:var(--ink3);font-family:var(--fb);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.tab.active{background:var(--ink);color:#fff;}
.tab:hover:not(.active){color:var(--ink);}

/* ── SCREENS ── */
.screen{display:none;max-width:var(--max);margin:0 auto;padding:20px var(--pad) 80px;}
.screen.active{display:block;animation:fadeUp .25s var(--ease);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── SECTION TITLES ── */
.section-title{
  font-family:var(--ff);font-size:18px;font-weight:700;
  color:var(--ink);margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.section-badge{
  font-size:11px;font-weight:600;padding:4px 10px;
  border-radius:100px;background:var(--surface);
  border:1px solid var(--stroke);color:var(--ink2);
  font-family:var(--fb);
}

/* ── STANDINGS ── */
.standings-list{display:flex;flex-direction:column;gap:6px;}
.standing-row{
  display:flex;align-items:center;gap:10px;
  padding:13px 14px;border-radius:12px;
  background:var(--surface);border:1px solid var(--stroke);
  transition:border-color .15s;
}
.standing-row.gold{
  background:rgba(255,193,7,.05);
  border-color:rgba(255,193,7,.30);
}
.standing-row.silver{
  background:rgba(192,192,192,.05);
  border-color:rgba(192,192,192,.25);
}
.standing-row.bronze{
  background:rgba(205,127,50,.05);
  border-color:rgba(205,127,50,.20);
}
.rank-badge{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ff);font-weight:700;font-size:13px;
  background:var(--surface2);color:var(--ink);
}
.standing-row.gold .rank-badge{background:var(--gold);color:#141414;}
.standing-row.silver .rank-badge{background:#c0c0c0;color:#fff;}
.standing-row.bronze .rank-badge{background:#cd7f32;color:#fff;}
.standing-info{flex:1;min-width:0;}
.standing-name{font-size:14px;font-weight:600;color:var(--ink);}
.standing-sub{
  display:flex;align-items:center;gap:8px;margin-top:3px;
  font-size:11px;color:var(--ink3);font-weight:500;
}
.bracket-chip{
  font-size:10px;font-weight:700;padding:2px 8px;
  border-radius:100px;letter-spacing:.04em;text-transform:uppercase;
}
.bracket-chip.top{background:var(--green-dim);color:var(--green);}
.bracket-chip.bottom{background:var(--red-dim);color:var(--red);}
.standing-metrics{display:flex;gap:4px;flex-shrink:0;}
.metric-box{
  text-align:center;padding:6px 10px;
  border-left:1px solid var(--stroke);min-width:52px;
}
.metric-val{
  font-family:var(--ff);font-size:17px;font-weight:700;
  color:var(--ink);line-height:1;display:block;
}
.metric-val.green{color:var(--green);}
.metric-val.orange{color:#ff9800;}
.metric-val.red{color:var(--red);}
.metric-lbl{
  font-size:9px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;color:var(--ink3);
  margin-top:3px;display:block;white-space:nowrap;
}

/* ── BRACKET ── */
.bracket-wrap{display:flex;flex-direction:column;gap:16px;}
.bracket-round-card{
  background:var(--surface);border:1px solid var(--stroke);
  border-radius:14px;overflow:hidden;
}
.bracket-round-head{
  padding:14px 16px;
  border-bottom:1px solid var(--stroke);
  display:flex;align-items:center;justify-content:space-between;
}
.bracket-round-name{
  font-family:var(--ff);font-size:15px;font-weight:700;color:var(--ink);
}
.round-chip{
  font-size:10px;font-weight:600;padding:4px 10px;
  border-radius:100px;background:var(--surface2);
  color:var(--ink2);letter-spacing:.04em;
}
.bracket-matches{padding:12px;}
.bracket-match{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:10px;
  background:var(--surface2);margin-bottom:8px;
  border:1px solid transparent;
}
.bracket-match:last-child{margin-bottom:0;}
.bracket-match.done{
  background:rgba(52,199,89,.04);
  border-color:rgba(52,199,89,.15);
}
.bracket-match.finals-gold{
  background:rgba(255,193,7,.05);
  border-color:rgba(255,193,7,.25);
}
.match-players{
  flex:1;display:flex;align-items:center;gap:8px;min-width:0;
}
.match-p{
  font-size:13px;font-weight:600;color:var(--ink);
  flex:1;text-align:center;
  padding:8px 6px;border-radius:8px;
  background:var(--surface);border:1px solid var(--stroke);
  word-break:break-word;line-height:1.2;
}
.match-p.winner{
  background:var(--green-dim);
  border-color:rgba(52,199,89,.25);
  color:var(--green);
}
.match-p.loser{
  background:var(--red-dim);
  border-color:rgba(255,59,48,.12);
  color:var(--red);
  opacity:.75;
}
.match-vs{
  font-size:11px;font-weight:700;color:var(--ink3);
  flex-shrink:0;letter-spacing:.04em;
}
.match-court{
  font-size:10px;font-weight:600;color:var(--ink3);
  padding:4px 8px;border-radius:6px;
  background:var(--surface);border:1px solid var(--stroke);
  flex-shrink:0;white-space:nowrap;
}
.bye-match-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  background:rgba(255,193,7,.05);
  border:1px dashed rgba(255,193,7,.30);
  margin-bottom:8px;
  font-size:13px;font-weight:600;color:var(--gold2);
}
.bye-match-row:last-child{margin-bottom:0;}
.bye-match-row svg{
  width:16px;height:16px;stroke:var(--gold2);
  fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;
  flex-shrink:0;
}
.bracket-split-label{
  font-size:11px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--ink3);
  padding:8px 12px 4px;
}

/* ── FINALS TAB ── */
.finals-wrap{display:flex;flex-direction:column;gap:14px;}
.final-match-card{
  background:var(--surface);border:1px solid var(--stroke);
  border-radius:14px;padding:18px 16px;
}
.final-match-card.gold-match{
  background:rgba(255,193,7,.04);
  border-color:rgba(255,193,7,.35);
}
.final-match-card.bronze-match{
  background:rgba(205,127,50,.04);
  border-color:rgba(205,127,50,.25);
}
.final-match-label{
  font-size:10px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:6px;
}
.final-match-label.gold{color:var(--gold2);}
.final-match-label.bronze{color:#cd7f32;}
.final-match-label.bottom{color:var(--ink3);}
.final-versus{
  display:flex;align-items:stretch;gap:10px;
}
.final-player{
  flex:1;padding:16px 12px;border-radius:10px;
  text-align:center;font-weight:600;font-size:15px;
  background:var(--surface2);border:1px solid var(--stroke);
  word-break:break-word;line-height:1.3;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;
}
.final-player.winner{
  background:var(--green-dim);
  border-color:rgba(52,199,89,.25);
  color:var(--green);
}
.final-player.loser{
  background:var(--red-dim);
  border-color:rgba(255,59,48,.12);
  color:var(--red);
  opacity:.7;
}
.final-player-tag{
  font-size:9px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;opacity:.7;
}
.final-vs-mid{
  display:flex;align-items:center;
  font-family:var(--ff);font-size:12px;font-weight:700;
  color:var(--ink3);flex-shrink:0;
}
.pending-badge{
  text-align:center;padding:10px;
  font-size:12px;color:var(--ink3);font-weight:500;
}

/* ── LOADING ── */
.loading-wrap{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 20px;gap:14px;
}
.spinner{
  width:36px;height:36px;border:3px solid var(--stroke2);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--ink3);font-weight:500;}

/* ── EMPTY / ERROR ── */
.empty-wrap{
  text-align:center;padding:60px 20px;
}
.empty-icon{font-size:48px;margin-bottom:12px;display:block;}
.empty-title{
  font-family:var(--ff);font-size:20px;font-weight:700;
  color:var(--ink);margin-bottom:6px;
}
.empty-desc{font-size:13px;color:var(--ink3);line-height:1.6;}

/* ── REFRESH BTN ── */
.refresh-row{
  display:flex;justify-content:center;
  margin-bottom:16px;
}
.refresh-btn{
  display:flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:100px;
  border:1px solid var(--stroke2);background:var(--surface);
  color:var(--ink2);font-family:var(--fb);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.refresh-btn:hover{background:var(--surface2);}
.refresh-btn svg{
  width:13px;height:13px;stroke:currentColor;
  fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;
}
.refresh-btn.spinning svg{animation:spin .7s linear infinite;}

/* ── PUBLISHED DATE ── */
.pub-date{
  text-align:center;font-size:11px;color:var(--ink3);
  font-weight:500;margin-bottom:18px;
}


/* ── RULES TAB ── */
.rules-wrap {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.rules-section {
  background: var(--surface);
  border: 1px solid var(--stroke);
  border-radius: 14px;
  overflow: hidden;
}

.rules-section-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--stroke);
  display: flex;
  align-items: center;
  gap: 10px;
}

.rules-section-icon {
  display: none;
}

.rules-section-title {
  font-family: var(--ff);
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
}

.rules-body {
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.rules-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  background: var(--surface2);
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.5;
}

.rules-row-icon {
  font-size: 15px;
  flex-shrink: 0;
  margin-top: 1px;
}

.rules-row strong {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 2px;
}

/* Points table */
.points-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.points-table th {
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink3);
  padding: 8px 12px;
  border-bottom: 1px solid var(--stroke);
}

.points-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--stroke);
  color: var(--ink2);
  font-weight: 500;
}

.points-table tr:last-child td {
  border-bottom: none;
}

.points-table td:last-child {
  font-family: var(--ff);
  font-weight: 700;
  color: var(--ink);
  text-align: right;
}

.pts-gold { color: var(--gold2) !important; }
.pts-green { color: var(--green) !important; }

/* Win rate bar */
.wr-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  gap: 10px;
}

.wr-row.green { background: var(--green-dim); color: var(--green); }
.wr-row.orange { background: rgba(255,152,0,.10); color: #e65100; }
.wr-row.red { background: var(--red-dim); color: var(--red); }

.wr-label { flex: 1; }
.wr-value { font-family: var(--ff); font-weight: 700; font-size: 13px; }

/* Ranking order */
.rank-order {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.rank-order-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  background: var(--surface2);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
}

.rank-order-num {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  background: var(--surface);
  border: 1px solid var(--stroke);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--ff);
  font-size: 12px;
  font-weight: 700;
  color: var(--ink);
  flex-shrink: 0;
}

.rank-order-item.gold-item { background: rgba(255,193,7,.08); }
.rank-order-item.gold-item .rank-order-num { background: var(--gold); color: #141414; border-color: transparent; }
.rank-order-item.silver-item { background: rgba(192,192,192,.08); }
.rank-order-item.silver-item .rank-order-num { background: #c0c0c0; color: #fff; border-color: transparent; }
.rank-order-item.bronze-item { background: rgba(205,127,50,.08); }
.rank-order-item.bronze-item .rank-order-num { background: #cd7f32; color: #fff; border-color: transparent; }

.rank-order-divider {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink3);
  padding: 6px 12px 2px;
}



/* ── MOBILE ── */
@media(max-width:400px){
  .champ-stats-row{gap:16px;}
  .metric-box{min-width:44px;padding:6px 6px;}
  .metric-val{font-size:15px;}
}
@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>
<body>

<!-- NAV -->
<header>
  <div class="nav">
    <a class="brand" href="index.html">
      <div class="brand-icon">
        <img src="assets/images/logo.jpeg" alt="IRONFLOW">
      </div>
      <div class="brand-text">
        <strong>IRONFLOW</strong>
        <small>Badminton</small>
      </div>
    </a>
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 16 16"><path d="M10 4L6 8l4 4"/></svg>
      Back
    </a>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <p class="hero-kicker">IronFlow Club · Sharjah</p>
  <h1 class="hero-title">Badminton<br>Tournament</h1>
  <div class="live-pill" id="livePill">

<!-- CHAMPION CARD (hidden until data loads) -->

  <div class="champ-inner">

      </div>

      </div>

<!-- TABS -->
<div class="tabs-wrap">

    <button class="tab active" onclick="switchTab('standings', this)">Standings</button>
    <button class="tab" onclick="switchTab('bracket', this)">Bracket</button>
    <button class="tab" onclick="switchTab('finals', this)">Finals</button>
    <button class="tab" onclick="switchTab('rules', this)">Rules</button>
  </div>
</div>

<!-- STANDINGS SCREEN -->
<div class="screen active" id="standingsScreen">
  <div id="standingsContent">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p class="loading-text">Loading standings...</p>

</div>

<!-- BRACKET SCREEN -->
<div class="screen" id="bracketScreen">
  <div id="bracketContent">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p class="loading-text">Loading bracket...</p>
    </div>
  </div>
</div>

<!-- FINALS SCREEN -->
<div class="screen" id="finalsScreen">
  <div id="finalsContent">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p class="loading-text">Loading finals...</p>
    </div>
  </div>
</div>

  <div id="rulesContent"></div>
</div>

<script>
const Utils = {
  sanitize(str = '') {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
};

</script>

<script>
// ── CONFIG ──
const API_URL = 'https://script.google.com/macros/s/AKfycbw1Wc2zxro6o8C4QkyFQ4EbUoM0622RYJsTc-4k3BEORn-x_TBsDUmZiEg8S8hEsQ/exec';
const CACHE_TTL = 60000; // 1 min cache

let _cachedData = null;
let _cacheTime = 0;
let _tournamentData = null;

// ── TAB SWITCHING ──
function switchTab(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(name + 'Screen').classList.add('active');
  if (name === 'rules') renderRules();
  if (btn) btn.classList.add('active');
}

// ── FETCH DATA ──
async function fetchTournamentData(force = false) {
  const now = Date.now();
  if (!force && _cachedData && (now - _cacheTime) < CACHE_TTL) {
    return _cachedData;
  }

  const url = API_URL + '?action=getLatest';
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  _cachedData = data;
  _cacheTime = now;
  return data;
}

// ── INIT ──
async function init() {
  try {
    const data = await fetchTournamentData();
    _tournamentData = data;

    if (data.error) {
      showEmpty();
      return;
    }

    updateLivePill(data);

    try {
      renderChampion(data);
    } catch(e) {
      console.error('Champion failed', e);
    }

    try {
      renderStandings(data.standings);
    } catch(e) {
      console.error('Standings failed', e);
    }

    try {
      renderBracket(data.matches, data.players);
    } catch(e) {
      console.error('Bracket failed', e);
    }

    try {
      renderFinals(data.matches, data.players);
    } catch(e) {
      console.error('Finals failed', e);
    }

  } catch (err) {
    console.error(err);
    showError();
  }
}

// ── LIVE PILL ──
function updateLivePill(data) {
  const pill = document.getElementById('livePill');
  const text = document.getElementById('livePillText');

  // Check if all matches are done = tournament finished
  const allDone = data.matches
    .filter(m => !m.bye)
    .every(m => m.completed);

  if (allDone && data.matches.length > 0) {
    pill.classList.add('done');
    const d = new Date(data.publishedAt);
    text.textContent = 'Final Results · ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  } else {
    const done = data.matches.filter(m => !m.bye && m.completed).length;
    const total = data.matches.filter(m => !m.bye).length;
    text.textContent = 'Live · ' + done + ' of ' + total + ' matches done';
  }
}

// ── CHAMPION ──
function renderChampion(data) {
  const champ = data.champion;
  if (!champ) return;

  document.getElementById('champName').textContent = champ.name;
  document.getElementById('champWins').textContent = champ.wins;
  document.getElementById('champLosses').textContent = champ.losses;
  document.getElementById('champWR').textContent = champ.winRate + '%';

  const d = new Date(data.publishedAt);
  document.getElementById('champMeta').textContent =
    'IronFlow Badminton · ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

  document.getElementById('champCard').style.display = 'block';
}
function renderRules() {
  const el = document.getElementById('rulesContent');

  el.innerHTML = `
  <div class="rules-wrap">

    <div class="rules-section">
      <div class="rules-section-head">
        <span class="rules-section-title">Round Structure</span>
      </div>
      <div class="rules-body">
        <div class="rules-row">
          <div><strong>Round 1 — Qualifiers</strong>
          All players randomly paired. Win goes to Top bracket, loss to Bottom bracket.</div>
        </div>
        <div class="rules-row">
          <div><strong>Round 2 — Split</strong>
          Players paired within their bracket only. Top vs Top, Bottom vs Bottom.</div>
        </div>
        <div class="rules-row">
          <div><strong>Round 3 — Filtering</strong>
          Same bracket pairing. Stronger players face stronger opponents.</div>
        </div>
        <div class="rules-row">
          <div><strong>Round 4 — Finals</strong>
          Gold Final, Bronze Match, and placement matches.
          Gold Final plays last — only after all other R4 matches finish.</div>
        </div>
      </div>
    </div>

    <div class="rules-section">
      <div class="rules-section-head">
        <span class="rules-section-title">Points System</span>
      </div>
      <div class="rules-body" style="padding:0;">
        <table class="points-table">
          <thead>
            <tr>
              <th>Outcome</th>
              <th>Round</th>
              <th style="text-align:right;">Points</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Bye (auto-advance)</td>
              <td>Any</td>
              <td class="pts-gold">+1</td>
            </tr>
            <tr>
              <td>Win</td>
              <td>R1 – R3</td>
              <td class="pts-green">+3</td>
            </tr>
            <tr>
              <td>Win</td>
              <td>Finals (R4)</td>
              <td class="pts-gold">+5</td>
            </tr>
            <tr>
              <td>Loss</td>
              <td>Any</td>
              <td>0</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>


    <div class="rules-section">
      <div class="rules-section-head">
        <span class="rules-section-title">Final Ranking Order</span>
      </div>
      <div class="rules-body">
        <div class="rank-order">
          <div class="rank-order-item gold-item">
            <span class="rank-order-num">1</span>Gold Final Winner
          </div>
          <div class="rank-order-item silver-item">
            <span class="rank-order-num">2</span>Gold Final Runner-up
          </div>
          <div class="rank-order-item bronze-item">
            <span class="rank-order-num">3</span>Bronze Match Winner
          </div>
          <div class="rank-order-item">
            <span class="rank-order-num">4</span>Bronze Match Runner-up
          </div>
          <div class="rank-order-item">
            <span class="rank-order-num">5+</span>Top Bracket Placements
          </div>
          <div class="rank-order-divider">Bottom Bracket</div>
          <div class="rank-order-item">
            <span class="rank-order-num">—</span>Bottom Final Winner & Runner-up
          </div>
          <div class="rank-order-item">
            <span class="rank-order-num">—</span>Bottom Placement Results
          </div>
        </div>
      </div>
    </div>

  </div>`;
}

function showError() {
  const html = emptyHTML('Could Not Load', 'Please check your connection and try again.');
  document.getElementById('standingsContent').innerHTML = html;
  document.getElementById('bracketContent').innerHTML = html;
  document.getElementById('finalsContent').innerHTML = html;
}

// ── STANDINGS ──
function renderStandings(standings) {
  const el = document.getElementById('standingsContent');
  if (!standings || standings.length === 0) {
    el.innerHTML = emptyHTML('No standings yet', 'Check back once matches are recorded.');
    return;
  }

  const medals = ['gold', 'silver', 'bronze'];

  const rows = standings.map((s, i) => {
    const cls = medals[i] || '';
    const bCls = s.bracket ? s.bracket.toLowerCase() : '';

    // Win rate color
    let wrCls = '';
    if (s.winRate >= 70) wrCls = 'green';
    else if (s.winRate >= 50) wrCls = 'orange';
    else if (s.winRate > 0) wrCls = 'red';

    return `
      <div class="standing-row ${cls}">
        <div class="rank-badge">${s.rank}</div>
        <div class="standing-info">
          <div class="standing-name">${Utils.sanitize(s.name)}</div>
          <div class="standing-sub">
            ${s.wins}W · ${s.losses}L
            ${s.bracket ? `<span class="bracket-chip ${bCls}">${Utils.sanitize(s.bracket)}</span>` : ''}
          </div>
        </div>
        <div class="standing-metrics">
          <div class="metric-box">
            <span class="metric-val ${wrCls}">${s.winRate}%</span>
            <span class="metric-lbl">Rate</span>
          </div>
          <div class="metric-box">
            <span class="metric-val">${s.points}</span>
            <span class="metric-lbl">Points</span>
          </div>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="refresh-row">
      <button class="refresh-btn" id="refreshBtn">
        <svg viewBox="0 0 16 16"><path d="M14 8A6 6 0 1 1 8 2a6 6 0 0 1 4.24 1.76L14 2v4h-4l1.59-1.59"/></svg>
        Refresh
      </button>
    </div>
    <div class="section-title">
      Standings
      <span class="section-badge">${standings.length} players</span>
    </div>
    <div class="standings-list">${rows}</div>`;
}

// ── BRACKET ──
function renderBracket(matchList, players) {
  const el = document.getElementById('bracketContent');

  const rounds = {1:'Qualifiers', 2:'Split Brackets', 3:'Filtering', 4:'Finals'};
  const chips = {1:'Round 1', 2:'Round 2', 3:'Round 3', 4:'Finals'};

  // Group by round
  const byRound = {};
  matchList.forEach(m => {
    if (!byRound[m.round]) byRound[m.round] = [];
    byRound[m.round].push(m);
  });

  if (Object.keys(byRound).length === 0) {
    el.innerHTML = emptyHTML('No bracket yet', 'The tournament has not started.');
    return;
  }

  let html = '<div class="bracket-wrap">';

  Object.entries(byRound).sort((a,b) => a[0]-b[0]).forEach(([round, rMatches]) => {
    const playMatches = rMatches.filter(m => !m.bye);
    const byeMatches  = rMatches.filter(m => m.bye);

    html += `
      <div class="bracket-round-card">
        <div class="bracket-round-head">
          <span class="bracket-round-name">Round ${round} — ${rounds[round] || ''}</span>
          <span class="round-chip">${chips[round] || ''}</span>
        </div>
        <div class="bracket-matches">`;

    // BYEs first
    byeMatches.forEach(m => {
      html += `
        <div class="bye-match-row">
          <svg viewBox="0 0 16 16"><path d="M8 2v4l3 3"/><circle cx="8" cy="8" r="6"/></svg>
          ${Utils.sanitize(m.player1)} — Auto Advance (BYE)
        </div>`;
    });

    // Play matches
    playMatches.forEach(m => {
      const isDone = m.completed;
      const isGold = m.label && m.label.includes('Gold');
      const p1Cls  = isDone ? (m.winner === m.player1 ? 'winner' : 'loser') : '';
      const p2Cls  = isDone ? (m.winner === m.player2 ? 'winner' : 'loser') : '';
      const court  = m.court ? 'Court ' + m.court : '';
      const lbl    = m.label || court;

      html += `
        <div class="bracket-match ${isDone ? 'done' : ''} ${isGold ? 'finals-gold' : ''}">
          <div class="match-players">
            <div class="match-p ${p1Cls}">${Utils.sanitize(m.player1)}</div>
            <span class="match-vs">VS</span>
            <div class="match-p ${p2Cls}">${Utils.sanitize(m.player2 || 'TBD')}</div>
          </div>
          ${lbl ? `<span class="match-court">${Utils.sanitize(lbl)}</span>` : ''}
        </div>`;
    });

    html += '</div></div>';
  });

  html += '</div>';
  el.innerHTML = html;
}

const refreshBtn = document.getElementById('refreshBtn');
refreshBtn?.addEventListener('click', handleRefresh);



// ── FINALS ──
function renderFinals(matchList, players) {
  const el = document.getElementById('finalsContent');

  const r4 = matchList.filter(m => m.round === 4 && !m.bye);

  if (r4.length === 0) {
    el.innerHTML = emptyHTML('Finals not yet', 'Finals will appear once Round 4 begins.');
    return;
  }

  let html = '<div class="finals-wrap">';

  r4.forEach(m => {
    const isGold   = m.label && m.label.includes('Gold');
    const isBronze = m.label && m.label.includes('Bronze');

    let cardCls  = '';
    let labelCls = 'bottom';
    let labelTxt = m.label || 'Placement Match';
    let emoji    = '';

    if (isGold)   { cardCls = 'gold-match';   labelCls = 'gold';   emoji = '🥇'; }
    if (isBronze) { cardCls = 'bronze-match';  labelCls = 'bronze'; emoji = '🥉'; }

    const p1Cls = m.completed ? (m.winner === m.player1 ? 'winner' : 'loser') : '';
    const p2Cls = m.completed ? (m.winner === m.player2 ? 'winner' : 'loser') : '';

    const p1Tag = m.completed && m.winner === m.player1 ? 'Winner' : '';
    const p2Tag = m.completed && m.winner === m.player2 ? 'Winner' : '';

    html += `
      <div class="final-match-card ${cardCls}">
        <div class="final-match-label ${labelCls}">
          ${emoji} ${Utils.sanitize(labelTxt)}
        </div>
        <div class="final-versus">
          <div class="final-player ${p1Cls}">
            ${Utils.sanitize(m.player1)}
            ${p1Tag ? `<span class="final-player-tag">${Utils.sanitize(p1Tag)}</span>` : ''}
          </div>
          <div class="final-vs-mid">VS</div>
          <div class="final-player ${p2Cls}">
            ${Utils.sanitize(m.player2 || 'TBD')}
            ${p2Tag ? `<span class="final-player-tag">${Utils.sanitize(p2Tag)}</span>` : ''}
          </div>
        </div>
        ${!m.completed ? '<p class="pending-badge">⏳ Match in progress</p>' : ''}
      </div>`;
  });

  html += '</div>';
  el.innerHTML = html;
}

// ── REFRESH ──
async function handleRefresh() {
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.classList.add('spinning');

  try {
    const data = await fetchTournamentData(true); // force bypass cache
    _tournamentData = data;
    updateLivePill(data);
    renderChampion(data);
    renderStandings(data.standings);
    renderBracket(data.matches, data.players);
    renderFinals(data.matches, data.players);
  } catch(e) {
    console.error(e);
  }

  if (btn) btn.classList.remove('spinning');
}

// ── EMPTY / ERROR ──
function emptyHTML(title, desc) {
  return `<div class="empty-wrap">
    <span class="empty-icon">🏸</span>
    <p class="empty-title">${Utils.sanitize(title)}</p>
    <p class="empty-desc">${Utils.sanitize(desc)}</p>
  </div>`;
}

function showEmpty() {
  const html = emptyHTML('No Tournament Yet', 'No tournament has been published yet. Check back soon!');
  document.getElementById('standingsContent').innerHTML = html;
  document.getElementById('bracketContent').innerHTML = html;
  document.getElementById('finalsContent').innerHTML = html;
  document.getElementById('livePillText').textContent = 'No data yet';
}



// ── START ──
init();
</script>
</body>
</html>
