<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IronFlow Club — Tournament</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}

:root{
  --bg:#fbfbfd;
  --surface:#ffffff;
  --surface2:#f5f5f8;
  --surface3:#ececf2;
  --ink:rgba(17,20,28,.94);
  --ink2:rgba(17,20,28,.62);
  --ink3:rgba(17,20,28,.45);
  --c1:#ffc107;
  --c1a:rgba(255,193,7,.12);
  --c2:#ff9800;
  --green:#34c759;
  --green-dim:rgba(52,199,89,.10);
  --red:#ff3b30;
  --red-dim:rgba(255,59,48,.08);
  --blue:#007aff;
  --stroke:rgba(17,20,28,.08);
  --stroke2:rgba(17,20,28,.14);
  --tx2:rgba(17,20,28,.62);
  --r:18px;
  --r-sm:12px;
  --r-pill:999px;
  --shadow:0 22px 70px rgba(17,20,28,.10);
  --shadow-sm:0 8px 24px rgba(17,20,28,.06);
  --nav-h:64px;
  --pad:16px;
  --max:680px;
  --max-wide:1100px;
  --ff:'Outfit',system-ui,sans-serif;
  --fb:'Inter',system-ui,-apple-system,sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --bounce:cubic-bezier(.34,1.56,.64,1);
}

body{
  font-family:var(--fb);
  background:var(--bg);
  color:var(--ink);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(1200px 700px at 18% 0%,rgba(255,193,7,.20),transparent 55%),
    radial-gradient(900px 650px at 100% 100%,rgba(0,170,255,.08),transparent 52%),
    linear-gradient(180deg,#fff 0%,#fbfbfd 70%);
  pointer-events:none;z-index:0;
}

.container{
  width:min(var(--max),100%);
  margin-inline:auto;padding-inline:var(--pad);
  position:relative;z-index:1;
}
.container-wide{
  width:min(var(--max-wide),100%);
  margin-inline:auto;padding-inline:var(--pad);
  position:relative;z-index:1;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(251,251,253,.78);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--stroke);
}
.nav{height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:38px;height:38px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ff);font-size:13px;font-weight:800;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  color:#141414;flex-shrink:0;
  box-shadow:0 8px 20px rgba(255,193,7,.25);
}
.brand-text strong{display:block;font-family:var(--fb);font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
.brand-text small{display:block;font-size:10px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:rgba(161,115,0,.92);margin-top:2px}
.nav-btn{
  display:inline-flex;align-items:center;gap:6px;
  height:38px;padding:0 16px;border-radius:var(--r-pill);
  border:1px solid var(--stroke2);background:rgba(255,255,255,.70);
  color:var(--ink);font-family:var(--fb);font-weight:700;
  font-size:11px;letter-spacing:.10em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
  box-shadow:0 8px 20px rgba(17,20,28,.05);
}
.nav-btn:hover{background:rgba(255,193,7,.14);border-color:rgba(255,193,7,.35)}
.nav-btn:active{transform:scale(.96)}

/* ── STATUS ── */
.status-bar{
  display:flex;align-items:center;gap:8px;
  margin:14px 0 0;padding:10px 16px;border-radius:var(--r-pill);
  background:rgba(255,255,255,.80);border:1px solid var(--stroke);
  box-shadow:var(--shadow-sm);width:fit-content;
}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--c1);flex-shrink:0}
.status-dot.live{animation:pulse 2s ease infinite}
.status-dot.done{background:var(--green);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#statusText{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2)}

/* ── TABS ── */
.tab-bar{
  display:flex;gap:3px;margin:14px 0 0;padding:5px;
  border-radius:var(--r);background:rgba(255,255,255,.70);
  border:1px solid var(--stroke);box-shadow:var(--shadow-sm);
  backdrop-filter:blur(10px);
}
.tab{
  flex:1;min-height:44px;display:flex;align-items:center;justify-content:center;
  padding:10px 4px;border-radius:var(--r-sm);border:none;
  background:transparent;color:var(--ink3);
  font-family:var(--fb);font-size:13px;font-weight:700;letter-spacing:.04em;
  cursor:pointer;transition:all .25s var(--ease);
  -webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.tab.active{background:rgba(255,193,7,.15);color:var(--ink);box-shadow:0 4px 12px rgba(255,193,7,.10)}
.tab:hover:not(.active){background:rgba(17,20,28,.04)}

/* ── SCREENS ── */
.screen{display:none;padding:20px 0 80px;animation:fadeUp .3s var(--ease)}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.section-title{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.section-title h2{font-family:var(--ff);font-size:22px;font-weight:800;color:var(--ink);letter-spacing:.02em}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;padding:0 9px;border-radius:var(--r-pill);background:linear-gradient(135deg,var(--c1),var(--c2));color:#141414;font-size:12px;font-weight:800}
.live-badge{background:var(--green);color:#fff;font-size:10px;letter-spacing:.10em;text-transform:uppercase}

/* ── INPUTS ── */
.input-row{display:flex;gap:10px;margin-bottom:12px}
.input-row input{
  flex:1;padding:14px 16px;border-radius:var(--r-sm);
  border:1px solid var(--stroke2);background:rgba(255,255,255,.85);
  color:var(--ink);font-family:var(--fb);font-size:16px;font-weight:500;
  outline:none;transition:border-color .2s,box-shadow .2s;
  box-shadow:var(--shadow-sm);-webkit-appearance:none;
}
.input-row input:focus{border-color:var(--c1);box-shadow:0 0 0 4px rgba(255,193,7,.15)}
.input-row input::placeholder{color:var(--ink3)}
.btn-add{
  min-width:78px;padding:14px 20px;border-radius:var(--r-sm);border:none;
  background:linear-gradient(135deg,var(--c1),var(--c2));color:#141414;
  font-family:var(--fb);font-weight:800;font-size:13px;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;flex-shrink:0;transition:transform .15s var(--bounce);
  box-shadow:0 10px 28px rgba(255,193,7,.25);
  -webkit-tap-highlight-color:transparent;
}
.btn-add:hover{transform:scale(1.03)}
.btn-add:active{transform:scale(.97)}

.action-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.btn-outline{
  flex:1;min-width:120px;padding:12px 14px;border-radius:var(--r-sm);
  border:1px solid var(--stroke2);background:rgba(255,255,255,.70);
  color:var(--ink);font-family:var(--fb);font-weight:700;font-size:12px;
  letter-spacing:.04em;cursor:pointer;transition:all .2s;text-align:center;
  -webkit-tap-highlight-color:transparent;box-shadow:var(--shadow-sm);
}
.btn-outline:hover{background:rgba(255,193,7,.10);border-color:rgba(255,193,7,.35)}
.btn-outline.danger{color:var(--red);border-color:rgba(255,59,48,.20)}
.btn-outline.danger:hover{background:var(--red-dim);border-color:rgba(255,59,48,.40)}

/* ── PLAYER LIST ── */
.player-list{list-style:none;display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto}
.player-list::-webkit-scrollbar{width:4px}
.player-list::-webkit-scrollbar-thumb{background:var(--stroke2);border-radius:2px}
.player-list li{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;border-radius:var(--r-sm);
  background:rgba(255,255,255,.75);border:1px solid var(--stroke);
  transition:transform .15s var(--bounce);box-shadow:var(--shadow-sm);
}
.player-list li:hover{transform:translateY(-1px)}
.player-number{color:var(--ink3);font-size:12px;font-weight:700;margin-right:10px;min-width:28px}
.player-name{font-size:15px;font-weight:600;color:var(--ink)}
.remove-btn{
  background:none;border:1px solid rgba(255,59,48,.25);color:var(--red);
  font-size:13px;font-weight:700;cursor:pointer;padding:6px 14px;
  border-radius:var(--r-pill);transition:background .2s;min-height:36px;
  -webkit-tap-highlight-color:transparent;
}
.remove-btn:hover{background:var(--red-dim)}
.bracket-label{font-size:10px;font-weight:700;padding:4px 10px;border-radius:var(--r-pill);letter-spacing:.06em;text-transform:uppercase}
.bracket-label.top{background:var(--green-dim);color:var(--green)}
.bracket-label.bottom{background:var(--red-dim);color:var(--red)}

/* ── BUTTONS ── */
.generate-area{margin-top:22px}
.finish-area{margin-top:10px}
.btn{
  width:100%;min-height:54px;border-radius:var(--r-pill);
  display:flex;align-items:center;justify-content:center;
  padding:16px 28px;border:none;font-family:var(--ff);
  font-weight:800;font-size:13px;letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;transition:all .25s var(--ease);
  -webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;
}
.btn:active{transform:scale(.97)}
.btn-p,.btn-primary{
  background:linear-gradient(135deg,var(--c1),var(--c2));color:#141414;
  box-shadow:0 16px 44px rgba(255,193,7,.28);
}
.btn-p:hover,.btn-primary:hover{box-shadow:0 20px 50px rgba(255,193,7,.35);transform:translateY(-1px)}
.btn-primary:disabled{background:rgba(17,20,28,.08);color:var(--ink3);box-shadow:none;cursor:not-allowed;transform:none}
.btn-primary::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);animation:shimmer 4s 2s ease-in-out infinite}
.btn-primary:disabled::after{animation:none}
@keyframes shimmer{0%{left:-60%}30%,100%{left:130%}}
.btn-finish{background:rgba(17,20,28,.90);color:#fff;box-shadow:0 12px 36px rgba(17,20,28,.18)}
.btn-finish:hover{background:rgba(17,20,28,1);box-shadow:0 16px 44px rgba(17,20,28,.25)}

/* ── ROUND TABS ── */
.round-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.round-tabs::-webkit-scrollbar{height:3px}
.round-tabs::-webkit-scrollbar-thumb{background:var(--stroke2);border-radius:2px}
.round-tab{
  padding:9px 16px;border-radius:var(--r-pill);
  border:1px solid var(--stroke2);background:rgba(255,255,255,.70);
  color:var(--ink2);font-family:var(--fb);font-size:12px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
  transition:all .2s;white-space:nowrap;min-height:38px;
  -webkit-tap-highlight-color:transparent;
}
.round-tab.active{background:rgba(255,193,7,.12);border-color:rgba(255,193,7,.35);color:var(--ink)}
.round-tab:hover:not(.active){background:rgba(17,20,28,.04)}

/* ── MATCH CARDS ── */
.matches-grid{display:flex;flex-direction:column;gap:12px}
.match-card{
  border-radius:var(--r);background:rgba(255,255,255,.80);border:1px solid var(--stroke);
  padding:18px;transition:all .2s var(--ease);box-shadow:var(--shadow-sm);
  backdrop-filter:blur(8px);
}
.match-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.match-card.completed{background:rgba(52,199,89,.04);border-color:rgba(52,199,89,.20)}
.match-card.finals{background:linear-gradient(135deg,rgba(255,193,7,.08),rgba(255,152,0,.06));border-color:rgba(255,193,7,.30);box-shadow:0 12px 40px rgba(255,193,7,.12)}
.match-label{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--c2);margin-bottom:14px}
.match-label.court{color:var(--ink3)}

.match-versus{display:flex;align-items:stretch;gap:8px}
.player-pick{
  flex:1;padding:18px 12px;border-radius:var(--r-sm);
  border:1.5px solid var(--stroke2);background:rgba(255,255,255,.90);
  cursor:pointer;transition:all .2s var(--ease);text-align:center;
  -webkit-tap-highlight-color:transparent;min-height:72px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
}
.player-pick:hover{border-color:var(--c1);background:rgba(255,193,7,.06);transform:scale(1.02)}
.player-pick:active{transform:scale(.97);background:rgba(255,193,7,.12)}
.pick-name{display:block;font-size:16px;font-weight:700;color:var(--ink);word-break:break-word}
.pick-hint{display:block;font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.04em;text-transform:uppercase}
.vs-badge{font-family:var(--ff);font-size:11px;font-weight:800;color:var(--ink3);letter-spacing:.10em;text-transform:uppercase;flex-shrink:0;align-self:center}

.match-result-row{display:flex;align-items:stretch;gap:8px}
.result-player{
  flex:1;padding:14px 12px;border-radius:var(--r-sm);
  text-align:center;font-weight:700;font-size:15px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  word-break:break-word;
}
.result-player.winner{background:rgba(52,199,89,.10);color:var(--green);border:1px solid rgba(52,199,89,.20)}
.result-player.loser{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,59,48,.12);opacity:.65}
.winner-icon{display:block;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}

.undo-row{display:flex;justify-content:center;margin-top:12px}
.undo-btn{
  padding:8px 20px;border-radius:var(--r-pill);border:1px solid var(--stroke2);
  background:rgba(255,255,255,.60);color:var(--ink2);font-family:var(--fb);font-size:12px;font-weight:700;
  letter-spacing:.04em;cursor:pointer;transition:all .2s;min-height:36px;
  -webkit-tap-highlight-color:transparent;
}
.undo-btn:hover{background:var(--red-dim);border-color:rgba(255,59,48,.30);color:var(--red)}

.bye-card{
  padding:14px 16px;border-radius:var(--r-sm);
  background:rgba(52,199,89,.06);border:1px dashed rgba(52,199,89,.30);
  color:var(--green);font-weight:700;font-size:14px;text-align:center;margin-bottom:14px;
}

.round-status{text-align:center;margin-top:22px}
.status-text{font-size:14px;font-weight:600;color:var(--ink2)}
.status-complete{font-size:15px;color:var(--green);font-weight:700}

/* ── FILTER ── */
.filter-bar{display:flex;gap:8px;margin-bottom:18px}
.filter-chip{
  flex:1;padding:11px 10px;border-radius:var(--r-pill);
  border:1px solid var(--stroke2);background:rgba(255,255,255,.70);
  color:var(--ink2);font-family:var(--fb);font-size:12px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;cursor:pointer;
  transition:all .2s;text-align:center;min-height:42px;
  -webkit-tap-highlight-color:transparent;
}
.filter-chip.active{background:rgba(255,193,7,.12);border-color:rgba(255,193,7,.35);color:var(--ink)}
.filter-chip:hover:not(.active){background:rgba(17,20,28,.04)}

/* ── STANDINGS ── */
.standings-cards{display:flex;flex-direction:column;gap:8px}
.standing-card{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-radius:var(--r-sm);background:rgba(255,255,255,.75);border:1px solid var(--stroke);
  transition:all .15s var(--bounce);box-shadow:var(--shadow-sm);
}
.standing-card:hover{transform:translateY(-1px)}
.standing-card.gold{background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,193,7,.06));border-color:rgba(255,193,7,.30)}
.standing-card.silver{background:linear-gradient(135deg,rgba(192,192,192,.10),rgba(169,169,169,.05));border-color:rgba(192,192,192,.30)}
.standing-card.bronze{background:linear-gradient(135deg,rgba(205,127,50,.10),rgba(205,127,50,.05));border-color:rgba(205,127,50,.25)}
.rank-num{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ff);font-weight:800;font-size:14px;
  background:rgba(17,20,28,.06);color:var(--ink);
}
.standing-card.gold .rank-num{background:linear-gradient(135deg,var(--c1),var(--c2));color:#141414}
.staining-card.silver .rank-num{background:linear-gradient(135deg,#c0c0c0,#a9a9a9);color:#fff}
.standing-card.bronze .rank-num{background:linear-gradient(135deg,#cd7f32,#b5651d);color:#fff}
.standing-info{flex:1;min-width:0}
.standing-name{font-size:15px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.standing-stats{display:flex;gap:12px;margin-top:3px;flex-wrap:wrap}
.stat{font-size:12px;font-weight:600;color:var(--ink2)}
.stat-value{font-weight:800;color:var(--ink)}
.stat-value.wins{color:var(--green)}
.stat-value.losses{color:var(--red)}
.standing-rating{text-align:right;flex-shrink:0}
.rating-value{font-family:var(--ff);font-size:22px;font-weight:800;color:var(--ink);line-height:1}
.rating-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-top:2px}

/* ════════════════════════════════════════
   DRAW.IO STYLE BRACKET VIEW
   ════════════════════════════════════════ */

.bracket-container {
  display: flex;
  flex-direction: column;
  gap: 32px;
  padding: 20px 0;
}

.bracket-round {
  background: rgba(255,255,255,.80);
  border: 1px solid var(--stroke);
  border-radius: var(--r);
  padding: 24px;
  box-shadow: var(--shadow-sm);
}

.bracket-round-header {
  font-family: var(--ff);
  font-size: 18px;
  font-weight: 800;
  color: var(--ink);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--stroke);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.round-badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--c2);
  background: var(--c1a);
  padding: 4px 12px;
  border-radius: var(--r-pill);
}

/* Split layout for R2, R3, R4 */
.bracket-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.bracket-side {
  background: rgba(255,255,255,.60);
  border: 1px solid var(--stroke);
  border-radius: var(--r-sm);
  padding: 16px;
}

.bracket-side-title {
  font-family: var(--ff);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 16px;
  text-align: center;
  padding: 8px;
  background: var(--surface2);
  border-radius: var(--r-sm);
}

.bracket-side.top .bracket-side-title {
  background: var(--green-dim);
  color: var(--green);
}

.bracket-side.bottom .bracket-side-title {
  background: var(--red-dim);
  color: var(--red);
}

/* Individual Match Row */
.bracket-match-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  height: 80px;
}

.bracket-slot {
  flex: 0 0 120px;
  height: 100%;
  border: 2px solid var(--stroke);
  border-radius: var(--r-sm);
  background: rgba(255,255,255,.90);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  color: var(--ink);
  position: relative;
  transition: all .2s;
}

.bracket-slot.empty {
  background: rgba(17,20,28,.04);
  border-style: dashed;
  color: var(--ink3);
  font-size: 11px;
}

.bracket-slot.winner {
  background: rgba(52,199,89,.15);
  border-color: var(--green);
  color: var(--green);
  box-shadow: 0 4px 12px rgba(52,199,89,.20);
}

.bracket-slot.loser {
  background: rgba(255,59,48,.10);
  border-color: rgba(255,59,48,.30);
  color: var(--red);
  opacity: .8;
}

.bracket-slot.bye {
  background: linear-gradient(135deg, rgba(255,193,7,.20), rgba(255,152,0,.10));
  border-color: var(--c1);
  color: var(--c2);
  font-weight: 800;
}

/* Center Player Pair */
.bracket-pair {
  flex: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
  border-left: 2px solid var(--stroke2);
  margin-left: 8px;
}

.bracket-player {
  flex: 1;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-weight: 600;
  font-size: 14px;
  color: var(--ink);
  position: relative;
}

.bracket-player:first-child {
  border-bottom: 1px solid var(--stroke);
}

/* The brace connector */
.bracket-pair::before {
  content: '';
  position: absolute;
  left: -8px;
  top: 50%;
  transform: translateY(-50%);
  width: 8px;
  height: 60%;
  border-left: 2px solid var(--stroke2);
  border-top: 2px solid var(--stroke2);
  border-bottom: 2px solid var(--stroke2);
  border-radius: 4px 0 0 4px;
}

/* Arrows */
.bracket-arrow {
  font-size: 20px;
  color: var(--ink3);
  font-weight: 700;
  flex-shrink: 0;
  width: 24px;
  text-align: center;
}

.bracket-arrow.left { color: var(--red); opacity: .6; }
.bracket-arrow.right { color: var(--green); opacity: .6; }

/* Special finals styling */
.finals-match .bracket-pair {
  border-left-color: var(--c1);
}

.finals-match .bracket-player {
  font-weight: 800;
  font-size: 15px;
}

.finals-gold .bracket-side-title,
.finals-gold .bracket-slot.winner {
  background: linear-gradient(135deg, rgba(255,215,0,.25), rgba(255,193,7,.15));
  border-color: var(--c1);
  color: #141414;
}

.finals-bronze .bracket-slot.winner {
  background: linear-gradient(135deg, rgba(205,127,50,.20), rgba(205,127,50,.10));
  border-color: #cd7f32;
  color: #8b4513;
}

/* BYE Match styling */
.bye-match {
  opacity: .9;
}

.bye-match .bracket-pair {
  justify-content: center;
  border-left-style: dashed;
}

.bye-match .bracket-player {
  border-bottom: none;
  justify-content: center;
  font-style: italic;
  color: var(--ink2);
}

/* Responsive */
@media (max-width: 768px) {
  .bracket-split {
    grid-template-columns: 1fr;
    gap: 16px;
  }
  
  .bracket-slot {
    flex: 0 0 80px;
    font-size: 11px;
  }
  
  .bracket-player {
    font-size: 13px;
    padding: 0 12px;
  }
  
  .bracket-match-row {
    height: 68px;
    gap: 4px;
  }
}

/* Empty state for no bracket */
.bracket-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink2);
}

/* Status indicators */
.match-status-tag {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--green);
  color: white;
  font-size: 9px;
  font-weight: 800;
  padding: 2px 6px;
  border-radius: var(--r-pill);
  text-transform: uppercase;
  letter-spacing: .05em;
  box-shadow: 0 2px 8px rgba(52,199,89,.30);
}

.match-status-tag.pending {
  background: var(--ink3);
  box-shadow: none;
}

/* Legacy bracket empty card (kept for fallback) */
.bracket-empty-card{
  background:rgba(255,255,255,.80);border:1px solid var(--stroke);border-radius:var(--r);
  padding:48px 20px;text-align:center;box-shadow:var(--shadow-sm);
}
.bracket-empty-icon{
  width:52px;height:52px;border-radius:14px;background:var(--c1a);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ff);font-weight:800;font-size:18px;color:var(--c2);
  margin:0 auto 16px;
}
.bracket-empty-title{font-family:var(--ff);font-weight:800;font-size:18px;margin-bottom:6px;color:var(--ink)}
.bracket-empty-desc{color:var(--tx2);font-size:13px;margin-bottom:18px}

/* Champion Banner */
.champ{
  background:linear-gradient(135deg,rgba(255,215,0,.20),rgba(255,193,7,.10));
  border:2px solid rgba(255,193,7,.40);border-radius:var(--r);
  padding:32px 24px;text-align:center;margin-bottom:20px;
  box-shadow:0 20px 60px rgba(255,193,7,.20);
}
.champ-av{
  width:72px;height:72px;border-radius:20px;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ff);font-weight:800;font-size:26px;color:#141414;
  margin:0 auto 14px;box-shadow:0 12px 32px rgba(255,193,7,.40);
}
.champ-k{font-family:var(--ff);font-size:11px;font-weight:800;letter-spacing:.20em;text-transform:uppercase;color:var(--c2);margin-bottom:6px}
.champ-n{font-family:var(--ff);font-size:30px;font-weight:800;color:var(--ink);margin-bottom:4px;letter-spacing:.02em}
.champ-s{font-size:13px;color:var(--ink2);font-weight:600}

/* Stats Grid */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;
}
.st{
  background:rgba(255,255,255,.75);border:1px solid var(--stroke);
  border-radius:var(--r-sm);padding:14px 8px;text-align:center;
  box-shadow:var(--shadow-sm);
}
.st-v{font-family:var(--ff);font-size:20px;font-weight:800;color:var(--ink);line-height:1}
.st-l{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-top:5px}

/* Progress Bar */
.prog-wrap{
  background:rgba(255,255,255,.80);border:1px solid var(--stroke);
  border-radius:var(--r-sm);padding:14px 16px;margin-bottom:16px;
  box-shadow:var(--shadow-sm);
}
.prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prog-label{font-size:11px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--ink2)}
.prog-pct{font-family:var(--ff);font-size:14px;font-weight:800;color:var(--c2)}
.prog{height:6px;background:rgba(17,20,28,.06);border-radius:3px;overflow:hidden}
.prog-f{height:100%;background:linear-gradient(90deg,var(--c1),var(--c2));border-radius:3px;transition:width .5s var(--ease)}

/* Notes */
.bye-note{
  background:rgba(52,199,89,.06);border:1px dashed rgba(52,199,89,.30);
  border-radius:var(--r-sm);padding:12px 16px;margin-bottom:14px;
  color:var(--green);font-size:13px;font-weight:600;
}
.bye-note strong{font-weight:800}
.tap-hint,.live-tag{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.80);border:1px solid var(--stroke);
  border-radius:var(--r-pill);padding:9px 16px;margin-bottom:14px;
  font-size:12px;font-weight:700;color:var(--ink2);width:fit-content;
  box-shadow:var(--shadow-sm);
}
.tap-dot,.live-dot{width:7px;height:7px;border-radius:50%;background:var(--c1);animation:pulse 2s ease infinite}
.live-dot{background:var(--green)}

/* Mobile legacy bracket (for matches tab) */
.mb-bracket{display:block}
.mb-round{margin-bottom:24px}
.mb-round-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--stroke);
}
.mb-round-title{font-family:var(--ff);font-size:14px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--c2)}
.mb-round-count{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.04em}
.mb-section{margin-bottom:14px}
.mb-section-label{
  display:inline-block;margin-bottom:8px;padding:5px 14px;
  border-radius:var(--r-pill);font-family:var(--ff);font-size:10px;font-weight:800;
  letter-spacing:.12em;text-transform:uppercase;
}
.mb-section-label.top{background:var(--green-dim);color:var(--green);border:1px solid rgba(52,199,89,.25)}
.mb-section-label.bottom{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,59,48,.20)}
.mb-section-label.finals{background:linear-gradient(135deg,rgba(255,193,7,.18),rgba(255,152,0,.10));color:var(--c2);border:1px solid rgba(255,193,7,.40)}

.mb-matches{display:flex;flex-direction:column;gap:8px}
.mb-match{
  background:rgba(255,255,255,.85);border:1px solid var(--stroke);
  border-radius:var(--r-sm);overflow:hidden;
  transition:all .2s;box-shadow:var(--shadow-sm);
}
.mb-match.complete{border-color:rgba(52,199,89,.30)}
.mb-match.gold{background:linear-gradient(135deg,rgba(255,193,7,.10),rgba(255,152,0,.05));border-color:rgba(255,193,7,.40);box-shadow:0 12px 36px rgba(255,193,7,.15)}
.mb-match-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;background:rgba(17,20,28,.03);
  border-bottom:1px solid var(--stroke);
  font-size:10px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;
}
.mb-match-court{color:var(--ink2)}
.mb-match-status{color:var(--ink3)}
.mb-match-status.done{color:var(--green)}
.mb-match.gold .mb-match-head{background:rgba(255,193,7,.08);color:var(--c2)}
.mb-slot{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--stroke);
  transition:all .2s;
}
.mb-slot:last-child{border-bottom:none}
.mb-slot.winner{background:rgba(52,199,89,.06)}
.mb-slot.winner .mb-slot-name{color:var(--green);font-weight:800}
.mb-slot.loser{opacity:.5}
.mb-slot.loser .mb-slot-name{text-decoration:line-through;color:var(--ink2)}
.mb-slot-name{font-size:14px;font-weight:600;color:var(--ink)}
.mb-slot-mark{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:var(--r-pill)}
.mb-slot.winner .mb-slot-mark{background:var(--green);color:#fff}
.mb-slot.loser .mb-slot-mark{color:var(--ink3);border:1px solid var(--stroke2)}

/* Desktop bracket fallback */
.dt-bracket{display:none;overflow-x:auto;padding-bottom:14px}
.dt-rounds{display:flex;gap:48px;min-width:fit-content;padding:10px 4px}
.dt-round{display:flex;flex-direction:column;justify-content:space-around;min-width:200px;gap:14px}
.dt-round-title{
  font-family:var(--ff);font-size:11px;font-weight:800;letter-spacing:.14em;
  text-transform:uppercase;color:var(--c2);margin-bottom:8px;text-align:center;
  padding:8px 14px;background:var(--c1a);border:1px solid rgba(255,193,7,.25);border-radius:var(--r-pill);
}
.dt-match-wrap{position:relative;display:flex;align-items:center}
.dt-match{
  background:rgba(255,255,255,.85);border:1px solid var(--stroke);
  border-radius:var(--r-sm);overflow:hidden;width:100%;
  box-shadow:var(--shadow-sm);transition:all .2s;
}
.dt-match.complete{border-color:rgba(52,199,89,.30)}
.dt-match.gold{background:linear-gradient(135deg,rgba(255,193,7,.10),rgba(255,152,0,.05));border-color:rgba(255,193,7,.40)}
.dt-match-court{
  font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink2);padding:6px 10px;background:rgba(17,20,28,.03);
  border-bottom:1px solid var(--stroke);text-align:center;
}
.dt-slot{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 12px;border-bottom:1px solid var(--stroke);font-size:13px;
}
.dt-slot:last-child{border-bottom:none}
.dt-slot.winner{background:rgba(52,199,89,.08);font-weight:800;color:var(--green)}
.dt-slot.loser{opacity:.5}
.dt-slot.loser .dt-slot-name{text-decoration:line-through;color:var(--ink2)}
.dt-slot-name{font-weight:600;color:var(--ink)}
.dt-slot.winner .dt-slot-name{color:var(--green)}
.dt-slot-tick{font-size:9px;font-weight:800;color:var(--green);letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;background:rgba(52,199,89,.15);border-radius:var(--r-pill)}

@media(min-width:900px){
  .mb-bracket{display:none}
  .dt-bracket{display:block}
}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:48px 20px;color:var(--ink2);font-weight:600;font-size:14px}

/* ── MODAL ── */
.modal-backdrop{
  position:fixed;inset:0;z-index:200;
  background:rgba(17,20,28,.50);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;padding:20px;
  animation:backdropIn .25s ease;
}
@keyframes backdropIn{from{opacity:0}to{opacity:1}}
.modal-backdrop.hidden{display:none}
.modal{
  width:min(480px,100%);background:var(--surface);border:1px solid var(--stroke);
  border-radius:var(--r) var(--r) 20px 20px;padding:28px 24px;
  animation:modalUp .3s var(--ease);box-shadow:var(--shadow);
}
@keyframes modalUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-family:var(--ff);font-size:20px;font-weight:800;color:var(--ink);margin-bottom:8px}
.modal p{font-size:14px;color:var(--ink2);line-height:1.55;margin-bottom:22px}
.modal-actions{display:flex;gap:10px;flex-direction:column}
.modal-cancel{
  padding:14px;border-radius:var(--r-sm);border:1px solid var(--stroke2);
  background:rgba(255,255,255,.70);color:var(--ink);font-family:var(--fb);
  font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.modal-cancel:hover{background:rgba(17,20,28,.04)}
.modal-confirm{
  padding:14px;border-radius:var(--r-sm);border:none;
  background:linear-gradient(135deg,var(--c1),var(--c2));color:#141414;
  font-family:var(--fb);font-weight:800;font-size:14px;cursor:pointer;
  transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.modal-confirm.danger{background:var(--red);color:#fff}
.modal-confirm:active{transform:scale(.97)}

/* ── OVERLAY ── */
.overlay{
  position:fixed;inset:0;z-index:150;
  background:rgba(17,20,28,.50);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;animation:backdropIn .3s ease;
}
.overlay.hidden{display:none}
.overlay-content{
  width:min(520px,100%);max-height:88vh;overflow-y:auto;
  background:var(--surface);border:1px solid var(--stroke);
  border-radius:var(--r);box-shadow:var(--shadow);
  animation:modalUp .35s var(--ease);
}
.overlay-content::-webkit-scrollbar{width:4px}
.overlay-content::-webkit-scrollbar-thumb{background:var(--stroke2);border-radius:2px}
.overlay-header{display:flex;align-items:center;justify-content:space-between;padding:22px 22px 0}
.overlay-header h2{font-family:var(--ff);font-size:22px;font-weight:800;color:var(--ink)}
.overlay-close{
  padding:8px 16px;border-radius:var(--r-pill);border:1px solid var(--stroke2);
  background:rgba(255,255,255,.70);color:var(--ink);font-family:var(--fb);
  font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.overlay-close:hover{background:var(--red-dim);border-color:rgba(255,59,48,.30);color:var(--red)}
.overlay-body{padding:22px}
.overlay-footer{padding:0 22px 22px;display:flex;flex-direction:column;gap:10px}
.final-podium{display:flex;flex-direction:column;gap:9px;margin-bottom:20px}
.podium-card{
  display:flex;align-items:center;gap:14px;padding:18px;
  border-radius:var(--r-sm);background:rgba(255,255,255,.80);border:1px solid var(--stroke);
}
.podium-card.first{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,193,7,.08));border-color:rgba(255,193,7,.35)}
.podium-card.second{background:linear-gradient(135deg,rgba(192,192,192,.12),rgba(169,169,169,.06));border-color:rgba(192,192,192,.30)}
.podium-card.third{background:linear-gradient(135deg,rgba(205,127,50,.12),rgba(205,127,50,.06));border-color:rgba(205,127,50,.25)}
.podium-rank{
  width:44px;height:44px;border-radius:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ff);font-weight:800;font-size:16px;
  background:rgba(17,20,28,.06);color:var(--ink);
}
.podium-card.first .podium-rank{background:linear-gradient(135deg,var(--c1),var(--c2));color:#141414}
.podium-card.second .podium-rank{background:linear-gradient(135deg,#c0c0c0,#a9a9a9);color:#fff}
.podium-card.third .podium-rank{background:linear-gradient(135deg,#cd7f32,#b5651d);color:#fff}
.podium-name{font-size:18px;font-weight:800;color:var(--ink)}
.podium-label{font-size:11px;font-weight:700;color:var(--ink2);margin-top:2px;letter-spacing:.06em;text-transform:uppercase}
.final-stats-title{font-family:var(--ff);font-size:14px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--ink2);margin-bottom:10px}
.final-player-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--stroke);font-size:14px}
.final-player-row:last-child{border-bottom:none}
.final-player-name{font-weight:600;color:var(--ink)}
.final-player-stats{display:flex;gap:14px;color:var(--ink2);font-size:13px;flex-wrap:wrap}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
  left:50%;transform:translateX(-50%) translateY(120px);
  padding:14px 28px;border-radius:var(--r-pill);
  background:rgba(255,255,255,.92);border:1px solid var(--stroke);
  box-shadow:var(--shadow);backdrop-filter:blur(16px);
  color:var(--ink);font-family:var(--fb);font-weight:700;font-size:14px;
  z-index:300;transition:transform .4s var(--ease);max-width:88%;text-align:center;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-color:rgba(255,59,48,.30);background:rgba(255,245,245,.95);color:var(--red)}
.toast.success{border-color:rgba(52,199,89,.30);background:rgba(245,255,248,.95);color:var(--green)}

/* ── RESPONSIVE ── */
@media(min-width:600px){
  :root{--pad:28px}
  .matches-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .overlay-footer{flex-direction:row}
  .overlay-footer .btn,.overlay-footer .btn-outline{flex:1}
  .modal-actions{flex-direction:row}
  .modal-actions .modal-confirm,.modal-actions .modal-cancel{flex:1}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="nav">
      <div class="brand">
        <div class="brand-icon">
          <img src="assets/images/logo.jpeg" alt="IronFlow logo">
        </div>
        <div class="brand-text">
          <strong>IronFlow</strong>
          <small>Tournament</small>
        </div>
      </div>
      <div class="nav-actions">
        <button class="nav-btn" onclick="askReset()">Reset</button>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="status-bar">
    <span class="status-dot live" id="statusDot"></span>
    <span id="statusText">Not Started</span>
  </div>
</div>

<div class="container">
  <div class="tab-bar">
    <button class="tab active" data-tab="players" onclick="showScreen('players',this)"><span>Players</span></button>
    <button class="tab" data-tab="matches" onclick="showScreen('matches',this)"><span>Matches</span></button>
    <button class="tab" data-tab="bracket" onclick="showScreen('bracket',this)"><span>Bracket</span></button>
    <button class="tab" data-tab="standings" onclick="showScreen('standings',this)"><span>Standings</span></button>
  </div>
</div>

<section id="playersScreen" class="screen active">
  <div class="container">
    <div class="section-title">
      <h2>Players</h2>
      <span class="badge" id="playerCount">0</span>
    </div>
    <div class="input-row">
      <input type="text" id="playerNameInput" placeholder="Enter player name…" onkeydown="if(event.key==='Enter')addPlayer()">
      <button class="btn-add" onclick="addPlayer()">Add</button>
    </div>
    <div class="action-row">
      <button class="btn-outline" onclick="loadPresetPlayers()">Load 21 Players</button>
      <button class="btn-outline danger" onclick="askClearAll()">Clear All</button>
    </div>
    <ul id="playerList" class="player-list"></ul>
    <div class="generate-area">
      <button id="generateBtn" class="btn btn-primary" onclick="generateNextRound()">Generate Round 1</button>
    </div>
    <div class="finish-area" id="finishArea" style="display:none;"></div>
  </div>
</section>

<section id="matchesScreen" class="screen">
  <div class="container">
    <div class="section-title"><h2 id="matchesTitle">Matches</h2></div>
    <div class="round-tabs" id="roundTabs"></div>
    <div id="byeInfo" class="bye-card" style="display:none;"></div>
    <div id="matchesList" class="matches-grid"></div>
    <div class="round-status" id="roundStatus"></div>
  </div>
</section>

<section id="bracketScreen" class="screen">
  <div class="container-wide">
    <div class="section-title">
      <h2>Tournament Bracket</h2>
      <span class="badge live-badge" id="liveBadge">Live</span>
    </div>
    <div id="bracketWrapper">
      <!-- Bracket renders here -->
    </div>
  </div>
</section>

<section id="standingsScreen" class="screen">
  <div class="container">
    <div class="section-title"><h2>Standings</h2></div>
    <div class="filter-bar">
      <button class="filter-chip active" onclick="filterStandings('all',this)">All</button>
      <button class="filter-chip" onclick="filterStandings('Top',this)">Top</button>
      <button class="filter-chip" onclick="filterStandings('Bottom',this)">Bottom</button>
    </div>
    <div class="standings-cards" id="standingsBody"></div>
  </div>
</section>

<div class="overlay hidden" id="finalOverlay">
  <div class="overlay-content">
    <div class="overlay-header">
      <h2>Tournament Complete</h2>
      <button class="overlay-close" onclick="closeFinalOverlay()">Close</button>
    </div>
    <div class="overlay-body" id="finalSummary"></div>
    <div class="overlay-footer">
      <button class="btn btn-primary" onclick="viewFinalBracket()">View Bracket</button>
      <button class="btn-outline" onclick="closeFinalOverlay()">Back</button>
    </div>
  </div>
</div>

<div class="modal-backdrop hidden" id="modalBackdrop">
  <div class="modal">
    <h3 id="modalTitle">Confirm</h3>
    <p id="modalBody">Are you sure?</p>
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" id="modalConfirm">Confirm</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let players = [];
let matches = [];
let currentRound = 0;
let totalCourts = 4;
let currentFilter = 'all';
let viewingRound = 0;
let tournamentFinished = false;

window.onload = function() { loadState(); renderAll(); };

function saveState() {
  try { sessionStorage.setItem('if_tournament', JSON.stringify({ players, matches, currentRound, tournamentFinished })); } catch(e){}
}
function loadState() {
  try {
    const raw = sessionStorage.getItem('if_tournament');
    if (!raw) return;
    const d = JSON.parse(raw);
    players = d.players || []; matches = d.matches || [];
    currentRound = d.currentRound || 0; tournamentFinished = d.tournamentFinished || false;
  } catch(e) {}
}

function showModal(title, body, label, danger, cb) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  const btn = document.getElementById('modalConfirm');
  btn.textContent = label;
  btn.className = 'modal-confirm' + (danger ? ' danger' : '');
  btn.onclick = function() { closeModal(); if (cb) cb(); };
  document.getElementById('modalBackdrop').classList.remove('hidden');
}
function closeModal() { document.getElementById('modalBackdrop').classList.add('hidden'); }
document.addEventListener('click', function(e) { if (e.target.id === 'modalBackdrop') closeModal(); });

function showScreen(screen, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(screen + 'Screen').classList.add('active');
  if (btn) btn.classList.add('active');
  if (screen === 'standings') renderStandings();
  if (screen === 'bracket') renderBracket();
  if (screen === 'matches') renderMatches();
}

function addPlayer() {
  if (tournamentFinished) return showToast('Tournament has ended', true);
  const input = document.getElementById('playerNameInput');
  const name = input.value.trim();
  if (!name) return showToast('Enter a player name', true);
  if (players.find(p => p.name.toLowerCase() === name.toLowerCase())) return showToast('Player already exists', true);
  players.push(createPlayer(players.length + 1, name));
  input.value = ''; input.focus();
  saveState(); renderPlayers(); updateGenerateButton();
  showToast(name + ' added!');
}
function createPlayer(id, name) { return { id, name, wins: 0, losses: 0, bracket: null, hasBye: false, opponents: [] }; }
function removePlayer(id) {
  if (currentRound > 0) return showToast('Cannot remove during tournament', true);
  players = players.filter(p => p.id !== id);
  players.forEach((p, i) => p.id = i + 1);
  saveState(); renderPlayers(); updateGenerateButton();
}
function loadPresetPlayers() {
  if (currentRound > 0) return showToast('Tournament already started', true);
  const names = ["Faheem","Jerin","Mohid","Ayaan","Sameer","Saad","Hamza","Rahul","Anas","Mohammed","Badri","Usamah","Eshan","Amith","Afnan","Sarthak","Dev","Afham","Suhaib","Abdullah","Mujeeb"];
  players = names.map((name, i) => createPlayer(i + 1, name));
  saveState(); renderPlayers(); updateGenerateButton();
  showToast('21 players loaded!');
}
function askClearAll() {
  if (currentRound > 0) return showToast('Cannot clear during tournament', true);
  showModal('Clear All Players', 'This will remove all players. Continue?', 'Clear All', true, () => {
    players = []; matches = []; currentRound = 0; tournamentFinished = false; viewingRound = 0;
    saveState(); renderAll(); showToast('All cleared');
  });
}
function askReset() {
  showModal('Reset Tournament', 'This will erase all players and match results.', 'Reset', true, () => {
    try { sessionStorage.removeItem('if_tournament'); } catch(e){}
    players = []; matches = []; currentRound = 0; tournamentFinished = false; viewingRound = 0;
    renderAll(); showToast('Tournament reset');
  });
}
function renderPlayers() {
  const list = document.getElementById('playerList');
  document.getElementById('playerCount').textContent = players.length;
  if (players.length === 0) { list.innerHTML = '<li class="empty-state" style="border:none;background:none;box-shadow:none">No players added yet</li>'; return; }
  list.innerHTML = players.map(p => {
    let right = '';
    if (currentRound > 0 && p.bracket) right = '<span class="bracket-label ' + p.bracket.toLowerCase() + '">' + p.bracket + '</span>';
    else if (currentRound === 0 && !tournamentFinished) right = '<button class="remove-btn" onclick="removePlayer(' + p.id + ')">Remove</button>';
    return '<li><div><span class="player-number">#' + p.id + '</span><span class="player-name">' + p.name + '</span></div>' + right + '</li>';
  }).join('');
}

function generateNextRound() {
  if (tournamentFinished) return showToast('Tournament has ended', true);
  if (players.length < 4) return showToast('Need at least 4 players', true);
  currentRound++;
  if (currentRound === 1) generateRound1();
  else if (currentRound === 2) generateRound2();
  else if (currentRound === 3) generateRound3();
  else if (currentRound === 4) generateRound4();
  else { showToast('Tournament is over', true); currentRound--; return; }
  viewingRound = currentRound;
  saveState(); renderAll();
  switchToTab('matches');
  showToast('Round ' + currentRound + ' generated!');
}
function switchToTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector('[data-tab="' + tabName + '"]');
  if (tab) tab.classList.add('active');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(tabName + 'Screen').classList.add('active');
}

function generateRound1() {
  const shuffled = shuffleArray([...players]);
  const rm = []; let bp = null;
  if (shuffled.length % 2 !== 0) { bp = shuffled.pop(); bp.wins++; bp.hasBye = true; bp.bracket = 'Top'; }
  for (let i = 0; i < shuffled.length; i += 2) {
    rm.push({ id: matches.length + rm.length + 1, round: 1, court: Math.floor(i/2) % totalCourts + 1,
      player1: shuffled[i].id, player2: shuffled[i+1].id, winner: null, completed: false, bye: false });
  }
  if (bp) rm.push({ id: matches.length + rm.length + 1, round: 1, court: null, player1: bp.id, player2: null, winner: bp.id, completed: true, bye: true });
  matches = matches.concat(rm);
}
function generateRound2() {
  const top = players.filter(p => p.bracket === 'Top');
  const bot = players.filter(p => p.bracket === 'Bottom');
  let rm = pairGroup(top, 2, matches.length + 1, 1);
  rm = rm.concat(pairGroup(bot, 2, matches.length + rm.length + 1, getNextCourt(rm)));
  matches = matches.concat(rm);
}
function generateRound3() {
  const top = [...players.filter(p => p.bracket === 'Top')].sort(sortByPerformance);
  const bot = [...players.filter(p => p.bracket === 'Bottom')].sort(sortByPerformance);
  const eliteN = Math.min(6, top.length);
  let rm = pairGroup(top.slice(0, eliteN), 3, matches.length + 1, 1);
  if (top.slice(eliteN).length > 1) rm = rm.concat(pairGroup(top.slice(eliteN), 3, matches.length + rm.length + 1, getNextCourt(rm)));
  if (bot.length > 1) rm = rm.concat(pairGroup(bot, 3, matches.length + rm.length + 1, getNextCourt(rm)));
  matches = matches.concat(rm);
}
function generateRound4() {
  const rm = [];
  let matchId = matches.length + 1;
  let court = 1;
  const top = [...players.filter(p => p.bracket === 'Top')].sort(sortByPerformance);
  rm.push(...pairGroupForPlacement(top, 4, matchId, court, 'Top'));
  const bottom = [...players.filter(p => p.bracket === 'Bottom')].sort(sortByPerformance);
  rm.push(...pairGroupForPlacement(bottom, 4, matchId + rm.length, court + (rm.length % totalCourts), 'Bottom'));
  matches = matches.concat(rm);
}

function pairGroupForPlacement(group, round, startId, startCourt, labelPrefix) {
  const rm = [];
  let id = startId;
  let ct = startCourt;
  if (group.length % 2 !== 0) {
    const byePlayer = group.pop();
    byePlayer.wins++; byePlayer.hasBye = true;
    const p = players.find(x => x.id === byePlayer.id);
    if (p) { p.wins = byePlayer.wins; p.hasBye = true; }
    rm.push({ id: id++, round, court: null, player1: byePlayer.id, player2: null, winner: byePlayer.id, completed: true, bye: true, label: `${labelPrefix} BYE` });
  }
  for (let i = 0; i < group.length; i += 2) {
    const rank1 = i + 1; const rank2 = i + 2;
    let label;
    if (labelPrefix === 'Top') {
      if (rank1 === 1) label = '🥇 GOLD MATCH — 1st vs 2nd';
      else if (rank1 === 3) label = '🥉 BRONZE MATCH — 3rd vs 4th';
      else label = `Top Placement ${rank1} vs ${rank2}`;
    } else {
      if (rank1 === 1) label = `Bottom Final — ${rank1} vs ${rank2}`;
      else label = `Bottom Placement ${rank1} vs ${rank2}`;
    }
    rm.push({ id: id++, round, court: ((ct - 1) % totalCourts) + 1, player1: group[i].id, player2: group[i + 1].id, winner: null, completed: false, bye: false, label });
    ct++;
  }
  return rm;
}

function computeFinalStandings() {
  const round4Matches = matches.filter(m => m.round === 4);
  const topMatches = round4Matches.filter(m => { const p = players.find(x => x.id === m.player1); return p && p.bracket === 'Top'; });
  const botMatches = round4Matches.filter(m => { const p = players.find(x => x.id === m.player1); return p && p.bracket === 'Bottom'; });
  topMatches.sort((a, b) => { const aNum = parseInt(a.label.match(/\d+/)?.[0]) || 99; const bNum = parseInt(b.label.match(/\d+/)?.[0]) || 99; return aNum - bNum; });
  botMatches.sort((a, b) => { const aNum = parseInt(a.label.match(/\d+/)?.[0]) || 99; const bNum = parseInt(b.label.match(/\d+/)?.[0]) || 99; return aNum - bNum; });
  let rank = 1;
  const finalRanks = {};
  topMatches.forEach(m => {
    if (m.bye) { finalRanks[m.player1] = rank++; }
    else { const winner = m.winner; const loser = winner === m.player1 ? m.player2 : m.player1; finalRanks[winner] = rank++; finalRanks[loser] = rank++; }
  });
  botMatches.forEach(m => {
    if (m.bye) { finalRanks[m.player1] = rank++; }
    else { const winner = m.winner; const loser = winner === m.player1 ? m.player2 : m.player1; finalRanks[winner] = rank++; finalRanks[loser] = rank++; }
  });
  players.forEach(p => { p.finalRank = finalRanks[p.id] || 999; });
  return [...players].sort((a, b) => a.finalRank - b.finalRank);
}

function getNextCourt(existing) {
  const play = existing.filter(m => !m.bye);
  if (!play.length) return 1;
  return (play[play.length-1].court % totalCourts) + 1;
}
function pairGroup(group, round, startId, startCourt) {
  const sorted = [...group].sort(sortByPerformance);
  const rm = []; let id = startId; let ct = startCourt; let bp = null;
  if (sorted.length % 2 !== 0) {
    for (let i = sorted.length - 1; i >= 0; i--) {
      if (!sorted[i].hasBye) { bp = sorted.splice(i, 1)[0]; break; }
    }
    if (!bp && sorted.length % 2 !== 0) bp = sorted.pop();
    if (bp) {
      bp.wins++; bp.hasBye = true;
      const p = players.find(x => x.id === bp.id); if (p) { p.wins = bp.wins; p.hasBye = true; }
      rm.push({ id: id++, round, court: null, player1: bp.id, player2: null, winner: bp.id, completed: true, bye: true });
    }
  }
  const paired = []; const used = new Set();
  for (let i = 0; i < sorted.length; i++) {
    if (used.has(sorted[i].id)) continue;
    for (let j = i + 1; j < sorted.length; j++) {
      if (used.has(sorted[j].id)) continue;
      if (!sorted[i].opponents.includes(sorted[j].id)) {
        paired.push([sorted[i], sorted[j]]);
        used.add(sorted[i].id); used.add(sorted[j].id);
        break;
      }
    }
  }
  const unpaired = sorted.filter(p => !used.has(p.id));
  for (let i = 0; i < unpaired.length - 1; i += 2) paired.push([unpaired[i], unpaired[i+1]]);
  paired.forEach(pair => {
    rm.push({ id: id++, round, court: ((ct-1) % totalCourts) + 1, player1: pair[0].id, player2: pair[1].id, winner: null, completed: false, bye: false });
    ct++;
  });
  return rm;
}

function selectWinner(matchId, winnerId) {
  if (tournamentFinished) return;
  const m = matches.find(x => x.id === matchId);
  if (!m || m.completed) return;
  m.winner = winnerId; m.completed = true;
  const p1 = players.find(p => p.id === m.player1);
  const p2 = players.find(p => p.id === m.player2);
  p1.opponents.push(p2.id); p2.opponents.push(p1.id);
  if (winnerId === p1.id) {
    p1.wins++; p2.losses++;
    if (m.round === 1) { p1.bracket = 'Top'; p2.bracket = 'Bottom'; }
  } else {
    p2.wins++; p1.losses--;
    if (m.round === 1) { p2.bracket = 'Top'; p1.bracket = 'Bottom'; }
  }
  saveState(); renderMatches(); renderStandings(); renderBracket();
  updateGenerateButton(); updateFinishButton();
  showToast(players.find(p => p.id === winnerId).name + ' wins!');
}
function askUndo(matchId) {
  if (tournamentFinished) return showToast('Tournament has ended', true);
  const m = matches.find(x => x.id === matchId);
  if (!m || !m.completed || m.bye) return;
  showModal('Undo Result', 'Remove the result for this match?', 'Undo', false, () => {
    const p1 = players.find(p => p.id === m.player1);
    const p2 = players.find(p => p.id === m.player2);
    p1.opponents = p1.opponents.filter(id => id !== p2.id);
    p2.opponents = p2.opponents.filter(id => id !== p1.id);
    if (m.winner === p1.id) { p1.wins--; p2.losses--; } else { p2.wins--; p1.losses--; }
    if (m.round === 1) { p1.bracket = null; p2.bracket = null; }
    m.winner = null; m.completed = false;
    saveState(); renderMatches(); renderStandings(); renderBracket();
    updateGenerateButton(); updateFinishButton();
    showToast('Result undone');
  });
}

function askFinish() {
  const all = matches.filter(m => !m.bye);
  if (!all.every(m => m.completed)) return showToast('Complete all matches first', true);
  showModal('End Tournament', 'Lock all results and show final standings.', 'End Tournament', false, () => {
    tournamentFinished = true;
    saveState(); renderAll();
    showFinalSummary();
    showToast('Tournament complete!');
  });
}
function showFinalSummary() {
  const finalStandings = computeFinalStandings();
  const podium = finalStandings.slice(0, 3);
  const cls = ['first', 'second', 'third'];
  const lbl = ['Champion', 'Runner Up', '3rd Place'];

  let html = '<div class="final-podium">';
  podium.forEach((p, i) => {
    html += `<div class="podium-card ${cls[i]}">
      <div class="podium-rank">${p.finalRank}</div>
      <div>
        <div class="podium-name">${p.name}</div>
        <div class="podium-label">${lbl[i]}</div>
      </div>
    </div>`;
  });
  html += '</div><div class="final-stats-title">Full Rankings</div>';
  finalStandings.forEach(p => {
    html += `<div class="final-player-row">
      <span class="final-player-name">${p.finalRank}. ${p.name}</span>
      <span class="final-player-stats">
        <span>W: ${p.wins}</span>
        <span>L: ${p.losses}</span>
      </span>
    </div>`;
  });

  document.getElementById('finalSummary').innerHTML = html;
  document.getElementById('finalOverlay').classList.remove('hidden');
}

function closeFinalOverlay() { document.getElementById('finalOverlay').classList.add('hidden'); }
function viewFinalBracket() { closeFinalOverlay(); switchToTab('bracket'); renderBracket(); }
function updateFinishButton() {
  const area = document.getElementById('finishArea');
  if (!area) return;
  if (tournamentFinished) {
    area.style.display = 'block';
    area.innerHTML = '<button class="btn btn-finish" onclick="showFinalSummary()">View Final Results</button>';
  } else if (currentRound >= 1) {
    area.style.display = 'block';
    area.innerHTML = '<button class="btn btn-finish" onclick="askFinish()">End Tournament &amp; Save Results</button>';
  } else { area.style.display = 'none'; }
}

function renderMatches() {
  const container = document.getElementById('matchesList');
  const title = document.getElementById('matchesTitle');
  const byeInfo = document.getElementById('byeInfo');
  const status = document.getElementById('roundStatus');
  const tabs = document.getElementById('roundTabs');
  const names = ['', 'Qualifiers', 'Split', 'Filtering', 'Finals'];
  if (currentRound === 0) {
    title.textContent = 'Matches';
    container.innerHTML = '<div class="empty-state">Generate Round 1 from the Players tab</div>';
    byeInfo.style.display = 'none'; status.innerHTML = ''; tabs.innerHTML = '';
    return;
  }
  if (viewingRound === 0 || viewingRound > currentRound) viewingRound = currentRound;
  let th = '';
  for (let r = 1; r <= currentRound; r++) {
    th += '<button class="round-tab' + (r === viewingRound ? ' active' : '') + '" onclick="switchRound(' + r + ')">R' + r + ' — ' + (names[r] || 'Round ' + r) + '</button>';
  }
  tabs.innerHTML = th;
  title.textContent = 'Round ' + viewingRound + ' — ' + (names[viewingRound] || '');
  const rm = matches.filter(m => m.round === viewingRound);
  const bm = rm.filter(m => m.bye); const pm = rm.filter(m => !m.bye);
  if (bm.length > 0) {
    byeInfo.innerHTML = 'BYE — ' + bm.map(m => getPlayerName(m.player1)).join(', ') + ' advance automatically';
    byeInfo.style.display = 'block';
  } else byeInfo.style.display = 'none';
  container.innerHTML = pm.map(m => {
    const p1 = players.find(p => p.id === m.player1);
    const p2 = players.find(p => p.id === m.player2);
    const lbl = m.label || 'Court ' + m.court;
    const lcl = m.label ? '' : ' court';
    let cc = 'match-card';
    if (m.completed) cc += ' completed';
    if (m.label && m.label.includes('GOLD')) cc += ' finals';
    if (m.completed) {
      const p1c = m.winner === p1.id ? 'winner' : 'loser';
      const p2c = m.winner === p2.id ? 'winner' : 'loser';
      const cu = !tournamentFinished && viewingRound === currentRound;
      return '<div class="' + cc + '"><div class="match-label' + lcl + '">' + lbl + '</div><div class="match-result-row"><div class="result-player ' + p1c + '">' + p1.name + (m.winner === p1.id ? '<span class="winner-icon">Winner</span>' : '') + '</div><span class="vs-badge">VS</span><div class="result-player ' + p2c + '">' + p2.name + (m.winner === p2.id ? '<span class="winner-icon">Winner</span>' : '') + '</div></div>' + (cu ? '<div class="undo-row"><button class="undo-btn" onclick="askUndo(' + m.id + ')">Undo Result</button></div>' : '') + '</div>';
    } else {
      return '<div class="' + cc + '"><div class="match-label' + lcl + '">' + lbl + '</div><div class="match-versus"><button class="player-pick" onclick="selectWinner(' + m.id + ',' + p1.id + ')"><span class="pick-name">' + p1.name + '</span><span class="pick-hint">Tap to pick winner</span></button><span class="vs-badge">VS</span><button class="player-pick" onclick="selectWinner(' + m.id + ',' + p2.id + ')"><span class="pick-name">' + p2.name + '</span><span class="pick-hint">Tap to pick winner</span></button></div></div>';
    }
  }).join('');
  if (viewingRound === currentRound) {
    const done = pm.filter(m => m.completed).length; const total = pm.length;
    if (done === total && total > 0) {
      if (currentRound < 4 && !tournamentFinished) {
        status.innerHTML = '<p class="status-complete">All Round ' + currentRound + ' matches done!</p><button class="btn btn-primary" style="margin-top:14px;" onclick="generateNextRound()">Generate Round ' + (currentRound+1) + '</button>';
      } else if (tournamentFinished) status.innerHTML = '<p class="status-complete">Tournament Complete — Results Locked</p>';
      else status.innerHTML = '<p class="status-complete">All matches completed</p>';
    } else status.innerHTML = '<p class="status-text">' + done + ' of ' + total + ' matches done</p>';
  } else status.innerHTML = '';
}
function switchRound(r) { viewingRound = r; renderMatches(); }

function renderStandings() {
  const filterBar = document.querySelector('.filter-bar');
  if (filterBar) filterBar.style.display = tournamentFinished ? 'none' : 'flex';

  const container = document.getElementById('standingsBody');
  let sorted;

  if (tournamentFinished) {
    sorted = computeFinalStandings();
  } else {
    sorted = [...players].sort(sortByPerformance);
    if (currentFilter !== 'all') sorted = sorted.filter(p => p.bracket === currentFilter);
  }

  if (sorted.length === 0) { container.innerHTML = '<div class="empty-state">No standings yet</div>'; return; }

  const pc = ['gold', 'silver', 'bronze'];

  container.innerHTML = sorted.map((p, i) => {
    const displayRank = tournamentFinished ? p.finalRank : (i + 1);
    const tot = p.wins + p.losses;
    const pts = calcPoints(p);
    const byeWins = matches.filter(m => m.bye && m.player1 === p.id).length;
    const rc = displayRank <= 3 ? pc[displayRank - 1] : '';
    const bh = p.bracket ? '<span class="bracket-label ' + p.bracket.toLowerCase() + '">' + p.bracket + '</span>' : '';
    const byeBadge = byeWins > 0 ? '<span style="font-size:10px;color:var(--ink3);font-weight:600;margin-left:4px">(had bye)</span>' : '';

    return '<div class="standing-card ' + rc + '">'
      + '<div class="rank-num">' + displayRank + '</div>'
      + '<div class="standing-info">'
      +   '<div class="standing-name">' + p.name + ' ' + bh + byeBadge + '</div>'
      +   '<div class="standing-stats">'
      +     '<span class="stat">Won: <span class="stat-value wins">' + p.wins + '</span></span>'
      +     '<span class="stat">Lost: <span class="stat-value losses">' + p.losses + '</span></span>'
      +     '<span class="stat">Played: <span class="stat-value">' + tot + '</span></span>'
      +   '</div>'
      + '</div>'
      + '<div class="standing-rating">'
      +   '<div class="rating-value">' + pts + '</div>'
      +   '<div class="rating-label">PTS</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

function filterStandings(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderStandings();
}

function getInitials(name) { return name.split(' ').map(s => s[0]).join('').toUpperCase().slice(0, 2); }

/* ════════════════════════════════════════════════════
   BRACKET RENDERING - DRAW.IO STYLE (Option B / Placement)
   ════════════════════════════════════════════════════ */

function renderBracket() {
  const wrapper = document.getElementById('bracketWrapper');
  const liveBadge = document.getElementById('liveBadge');

  if (currentRound === 0) {
    wrapper.innerHTML = `
      <div class="bracket-empty">
        <div style="font-size: 48px; margin-bottom: 16px;">🏸</div>
        <h3 style="font-family: var(--ff); font-size: 20px; margin-bottom: 8px;">No bracket yet</h3>
        <p>Add players and generate Round 1 to see the bracket</p>
      </div>`;
    return;
  }

  // Update badge
  if (tournamentFinished) {
    liveBadge.textContent = 'Final';
    liveBadge.style.background = 'var(--c2)';
    liveBadge.style.color = '#141414';
  } else {
    liveBadge.textContent = 'Live';
    liveBadge.style.background = 'var(--green)';
    liveBadge.style.color = '#fff';
  }

  // Champion banner if finished
  let html = '';
  if (tournamentFinished) {
    const standings = computeFinalStandings();
    const champ = standings[0];
    if (champ) {
      const today = new Date().toISOString().slice(0, 10);
      html += '<div class="champ"><div class="champ-av">' + getInitials(champ.name) + '</div><p class="champ-k">Tournament Champion</p><p class="champ-n">' + champ.name + '</p><p class="champ-s">IronFlow Tournament · ' + today + '</p></div>';
    }
  }

  // Stats bar
  const totalM = matches.filter(m => !m.bye).length;
  const doneM = matches.filter(m => !m.bye && m.completed).length;
  const pct = totalM ? Math.round(doneM / totalM * 100) : 0;
  html += '<div class="stats"><div class="st"><div class="st-v">' + players.length + '</div><div class="st-l">Players</div></div><div class="st"><div class="st-v">' + doneM + '/' + totalM + '</div><div class="st-l">Matches</div></div><div class="st"><div class="st-v">' + (totalM - doneM) + '</div><div class="st-l">Pending</div></div><div class="st"><div class="st-v">' + pct + '%</div><div class="st-l">Done</div></div></div>';

  html += '<div class="prog-wrap"><div class="prog-row"><span class="prog-label">Tournament Progress</span><span class="prog-pct">' + pct + '%</span></div><div class="prog"><div class="prog-f" style="width:' + pct + '%"></div></div></div>';

  // BYE notes
  const byeCount = matches.filter(m => m.bye).length;
  if (byeCount > 0) html += '<div class="bye-note"><strong>' + byeCount + ' BYE' + (byeCount > 1 ? 's' : '') + '</strong> — advance automatically.</div>';

  if (!tournamentFinished && currentRound > 0) {
    html += '<div class="live-tag"><span class="live-dot"></span>Live — Updates as matches complete</div>';
  }

  // THE BRACKET CONTAINER
  html += '<div class="bracket-container">';
  html += renderRound1();
  if (currentRound >= 2) html += renderRound2();
  if (currentRound >= 3) html += renderRound3();
  if (currentRound >= 4) html += renderRound4();
  html += '</div>';

  wrapper.innerHTML = html;
}

function renderRound1() {
  const r1Matches = matches.filter(m => m.round === 1);
  const byeMatches = r1Matches.filter(m => m.bye);
  const playMatches = r1Matches.filter(m => !m.bye);

  let html = `<div class="bracket-round">
    <div class="bracket-round-header">
      <span>Round 1 — Qualifiers</span>
      <span class="round-badge">${playMatches.length} Matches</span>
    </div>`;
  
  playMatches.forEach(m => { html += renderMatchRow(m, 'qualifier'); });
  byeMatches.forEach(m => { html += renderByeRow(m); });
  html += '</div>';
  return html;
}

function renderRound2() {
  const r2Matches = matches.filter(m => m.round === 2);
  const topMatches = r2Matches.filter(m => { const p = players.find(x => x.id === m.player1); return p && p.bracket === 'Top'; });
  const botMatches = r2Matches.filter(m => { const p = players.find(x => x.id === m.player1); return p && p.bracket === 'Bottom'; });

  return `<div class="bracket-round">
    <div class="bracket-round-header">
      <span>Round 2 — Split Brackets</span>
      <span class="round-badge">Ranking Round</span>
    </div>
    <div class="bracket-split">
      <div class="bracket-side top">
        <div class="bracket-side-title">⬆️ Bracket 1 Ranking Round</div>
        ${topMatches.map(m => renderMatchRow(m, 'top')).join('')}
      </div>
      <div class="bracket-side bottom">
        <div class="bracket-side-title">⬇️ Bracket 2 Ranking Match</div>
        ${botMatches.map(m => renderMatchRow(m, 'bottom')).join('')}
      </div>
    </div>
  </div>`;
}

function renderRound3() {
  const r3Matches = matches.filter(m => m.round === 3);
  const topMatches = r3Matches.filter(m => { const p = players.find(x => x.id === m.player1); return p && p.bracket === 'Top'; });
  const botMatches = r3Matches.filter(m => { const p = players.find(x => x.id === m.player1); return p && p.bracket === 'Bottom'; });

  return `<div class="bracket-round">
    <div class="bracket-round-header">
      <span>Round 3 — Filtering</span>
      <span class="round-badge">Elite Seeding</span>
    </div>
    <div class="bracket-split">
      <div class="bracket-side top">
        <div class="bracket-side-title">⬆️ Top Bracket Filtering</div>
        ${topMatches.map(m => renderMatchRow(m, 'top')).join('')}
      </div>
      <div class="bracket-side bottom">
        <div class="bracket-side-title">⬇️ Bottom Bracket Filtering</div>
        ${botMatches.map(m => renderMatchRow(m, 'bottom')).join('')}
      </div>
    </div>
  </div>`;
}

function renderRound4() {
  const r4Matches = matches.filter(m => m.round === 4);
  const topMatches = r4Matches.filter(m => { const p = players.find(x => x.id === m.player1); return p && p.bracket === 'Top'; });
  const botMatches = r4Matches.filter(m => { const p = players.find(x => x.id === m.player1); return p && p.bracket === 'Bottom'; });

  return `<div class="bracket-round">
    <div class="bracket-round-header">
      <span>Round 4 — Finals</span>
      <span class="round-badge">Placement Matches</span>
    </div>
    <div class="bracket-split">
      <div class="bracket-side top finals-panel" style="border:2px solid rgba(255,193,7,.25);border-radius:var(--r);">
        <div class="bracket-side-title" style="background:linear-gradient(135deg,rgba(255,193,7,.15),rgba(255,152,0,.08));color:var(--c2)">🏆 Top Bracket Finals</div>
        ${topMatches.map((m, i) => {
          let type = 'finals';
          if (i === 0) type = 'finals-gold';
          else if (i === 1) type = 'finals-bronze';
          return renderMatchRow(m, type);
        }).join('')}
      </div>
      <div class="bracket-side bottom" style="border:2px solid rgba(169,169,169,.25);border-radius:var(--r);">
        <div class="bracket-side-title" style="background:rgba(192,192,192,.10);color:#666">📊 Bottom Bracket Finals</div>
        ${botMatches.map(m => renderMatchRow(m, 'bottom-finals')).join('')}
      </div>
    </div>
  </div>`;
}

function renderMatchRow(m, type) {
  const p1 = players.find(p => p.id === m.player1);
  const p2 = players.find(p => p.id === m.player2);
  if (!p1 || !p2) return '';

  let leftContent = 'Loser';
  let rightContent = 'Winner';
  let leftClass = 'empty';
  let rightClass = 'empty';
  let extraClass = '';

  if (m.completed) {
    const winner = players.find(p => p.id === m.winner);
    const loser = p1.id === m.winner ? p2 : p1;
    leftContent = loser.name;
    rightContent = winner.name;
    leftClass = 'loser';
    rightClass = 'winner';
  }

  if (m.label) {
    if (m.label.includes('GOLD')) extraClass = 'finals-gold';
    else if (m.label.includes('BRONZE')) extraClass = 'finals-bronze';
  }
  if (m.bye) extraClass = 'bye-match';

  return `
    <div class="bracket-match-row ${extraClass}">
      <div class="bracket-slot ${leftClass}">
        ${leftContent}
        ${m.completed ? '<span class="match-status-tag">L</span>' : ''}
      </div>
      <div class="bracket-arrow left">←</div>
      <div class="bracket-pair">
        <div class="bracket-player">${p1.name}</div>
        <div class="bracket-player">${p2.name}</div>
      </div>
      <div class="bracket-arrow right">→</div>
      <div class="bracket-slot ${rightClass}">
        ${rightContent}
        ${m.completed ? '<span class="match-status-tag">W</span>' : ''}
      </div>
    </div>`;
}

function renderByeRow(m) {
  const p = players.find(x => x.id === m.player1);
  if (!p) return '';
  return `
    <div class="bracket-match-row bye-match">
      <div class="bracket-slot empty">—</div>
      <div class="bracket-arrow left" style="opacity:0">←</div>
      <div class="bracket-pair" style="border-left-style: dashed;">
        <div class="bracket-player" style="border-bottom: none; justify-content: center;">
          ${p.name} (BYE)
        </div>
      </div>
      <div class="bracket-arrow right">→</div>
      <div class="bracket-slot bye">
        Auto-Advance
      </div>
    </div>`;
}

// Helper functions
function getPlayerName(id) { const p = players.find(p => p.id === id); return p ? p.name : 'Unknown'; }

function calcPoints(player) {
  let pts = 0;
  matches.forEach(m => {
    const inMatch = m.player1 === player.id || m.player2 === player.id;
    if (!inMatch) return;
    if (m.bye) { pts += 1; }
    else if (m.winner === player.id) { pts += m.round === 4 ? 5 : 3; }
    else if (m.completed) { pts += 1; }
  });
  return pts;
}

function sortByPerformance(a, b) {
  const ptsA = calcPoints(a); const ptsB = calcPoints(b);
  if (ptsB !== ptsA) return ptsB - ptsA;
  return a.losses - b.losses;
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateStatusBar() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (tournamentFinished) { dot.className = 'status-dot done'; text.textContent = 'Tournament Complete'; }
  else if (currentRound === 0) { dot.className = 'status-dot live'; text.textContent = 'Not Started'; }
  else {
    const r4done = currentRound === 4 && matches.filter(m => m.round === 4 && !m.bye).every(m => m.completed);
    dot.className = 'status-dot live';
    text.textContent = r4done ? 'Round 4 — All Done' : 'Round ' + currentRound + ' of 4';
  }
}

function updateGenerateButton() {
  const btn = document.getElementById('generateBtn');
  if (!btn) return;
  if (tournamentFinished) { btn.textContent = 'Tournament Ended'; btn.disabled = true; return; }
  if (currentRound === 0) { btn.textContent = 'Generate Round 1'; btn.disabled = players.length < 4; return; }
  if (currentRound === 4) {
    const f = matches.filter(m => m.round === 4 && !m.bye);
    btn.textContent = f.length > 0 && f.every(m => m.completed) ? 'All Rounds Complete' : 'Finals in Progress';
    btn.disabled = true; return;
  }
  const cp = matches.filter(m => m.round === currentRound && !m.bye);
  const ad = cp.length > 0 && cp.every(m => m.completed);
  btn.textContent = 'Generate Round ' + (currentRound + 1);
  btn.disabled = !ad;
}

// FINAL RENDER ALL (single definition)
function renderAll() {
  renderPlayers();
  renderMatches();
  renderStandings();
  renderBracket();
  updateStatusBar();
  updateGenerateButton();
  updateFinishButton();
}

// Toast system
let _toastTimer = null;
function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (err ? 'error' : 'success');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.className = 'toast'; }, 2600);
}
</script>
