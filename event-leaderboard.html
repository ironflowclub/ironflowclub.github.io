  <script>
    (function () {
      'use strict';

      const EVENTS_URL = 'https://opensheet.elk.sh/1L8m_uoBtYx-UIwqDy6D_TPHa_N7BygkAhmpYMHSUStg/Event_details';
      const TIER_MAIN = 5;
      const TIER_MID = 4;
      const TIER_LOW = 3;

      if (!window.IronflowData || !window.IronflowUtils) {
        console.error('[EventLB] Dependencies not loaded');
        return;
      }

      const Utils = window.IronflowUtils;

      let allActivityData = [];
      let allEvents = [];
      let selectedEventId = null;
      let chart = null;

      const top3El = document.getElementById('top3');
      const listEl = document.getElementById('list');
      const modal = document.getElementById('modal');
      const closeModalBtn = document.getElementById('closeModal');
      const eventPill = document.getElementById('eventPill');
      const eventPillText = document.getElementById('eventPillText');
      const eventDropdown = document.getElementById('eventDropdown');
      const eventInfoBanner = document.getElementById('eventInfoBanner');
      const eventInfoText = document.getElementById('eventInfoText');
      const participantChip = document.getElementById('participantChip');
      const participantCount = document.getElementById('participantCount');
      const paceOnlyNote = document.getElementById('paceOnlyNote');

      async function fetchEvents() {
        const res = await fetch(EVENTS_URL);
        if (!res.ok) throw new Error(`Event_details fetch failed — HTTP ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data) || !data.length) throw new Error('Event_details returned empty or invalid data');
        return data;
      }

      function buildDropdown(events) {
        eventDropdown.innerHTML = '';
        const sorted = [...events].sort((a, b) => b.event_date.localeCompare(a.event_date));

        sorted.forEach(ev => {
          const item = document.createElement('button');
          item.type = 'button';
          item.className = 'event-dropdown-item';
          item.setAttribute('role', 'option');
          item.dataset.id = String(ev.event_id);

          const name = document.createElement('div');
          name.className = 'event-dropdown-name';
          name.textContent = ev.event_name || 'Event';

          const meta = document.createElement('div');
          meta.className = 'event-dropdown-meta';

          const date = document.createElement('span');
          date.textContent = Utils.fmtDateShort ? Utils.fmtDateShort(ev.event_date) : ev.event_date;

          const dot = document.createElement('span');
          dot.className = 'dot';
          dot.textContent = '·';

          const location = document.createElement('span');
          location.textContent = ev.event_location || 'Sharjah';

          meta.append(date, dot, location);
          item.append(name, meta);

          item.addEventListener('click', () => {
            selectEvent(ev.event_id);
            closeDropdown();
          });

          eventDropdown.appendChild(item);
        });
      }

      function openDropdown() {
        eventDropdown.classList.add('open');
        eventPill.setAttribute('aria-expanded', 'true');
      }

      function closeDropdown() {
        eventDropdown.classList.remove('open');
        eventPill.setAttribute('aria-expanded', 'false');
      }

      function toggleDropdown() {
        eventDropdown.classList.contains('open') ? closeDropdown() : openDropdown();
      }

      function selectEvent(eventId) {
        selectedEventId = String(eventId);
        const ev = allEvents.find(e => String(e.event_id) === selectedEventId);
        if (!ev) return;

        eventPillText.textContent = ev.event_name || 'Select Event';

        eventDropdown.querySelectorAll('.event-dropdown-item').forEach(item => {
          item.classList.toggle('active', item.dataset.id === selectedEventId);
        });

        const dateStr = Utils.fmtDateShort ? Utils.fmtDateShort(ev.event_date) : ev.event_date;
        const location = ev.event_location || 'Sharjah';

        eventInfoText.innerHTML = '';
        const wrap = document.createElement('div');
        const title = document.createElement('strong');
        title.textContent = ev.event_name || 'Event';

        const meta = document.createElement('div');
        meta.className = 'ev-meta';

        const d1 = document.createElement('span');
        d1.textContent = dateStr;
        const dot = document.createElement('span');
        dot.className = 'ev-dot';
        const d2 = document.createElement('span');
        d2.textContent = location;

        meta.append(d1, dot, d2);
        wrap.append(title, meta);
        eventInfoText.appendChild(wrap);

        eventInfoBanner.style.display = 'flex';
        paceOnlyNote.style.display = 'block';

        renderEvent(selectedEventId);
      }

      function getEventRankings(eventId) {
        const eventRuns = allActivityData.filter(r => String(r.event_id) === String(eventId));
        const memberMap = {};

        eventRuns.forEach(r => {
          const name = r.member_name || 'Unknown';
          if (!memberMap[name]) memberMap[name] = { member_name: name, runs: [] };
          memberMap[name].runs.push(r);
        });

        const all = Object.values(memberMap).map(m => {
          const totalDist = m.runs.reduce((s, r) => s + parseFloat(r.distance_km || 0), 0);
          const totalTime = m.runs.reduce((s, r) => s + parseFloat(r.moving_time_min || 0), 0);
          const pace = totalDist > 0 ? totalTime / totalDist : 999;
          const allTimeRuns = allActivityData.filter(r => r.member_name === m.member_name).length;

          return { member_name: m.member_name, pace, totalDist, totalTime, allTimeRuns };
        });

        const byPace = (a, b) => a.pace - b.pace;

        return {
          qualified: all.filter(r => r.totalDist >= TIER_MAIN).sort(byPace),
          under4: all.filter(r => r.totalDist >= TIER_MID && r.totalDist < TIER_MAIN).sort(byPace),
          under3: all.filter(r => r.totalDist >= TIER_LOW && r.totalDist < TIER_MID).sort(byPace),
          under2: all.filter(r => r.totalDist < TIER_LOW).sort(byPace)
        };
      }

      function renderEvent(eventId) {
        Utils.clearElement(top3El);
        Utils.clearElement(listEl);

        const { qualified, under4, under3, under2 } = getEventRankings(eventId);
        const total = qualified.length + under4.length + under3.length + under2.length;

        participantChip.style.display = 'inline-flex';
        participantCount.textContent = total;

        if (!total) {
          top3El.innerHTML = `
            <div class="empty-state">
              <span class="empty-state-icon">🏃</span>
              <p class="empty-state-text">No runners recorded for this event</p>
            </div>
          `;
          return;
        }

        if (!qualified.length) {
          top3El.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;color:rgba(255,255,255,.65);padding:30px 0;font-weight:700;font-size:13px">
              No runners completed ${TIER_MAIN} km yet
            </div>
          `;
        } else {
          renderTop3(qualified);
        }

        renderList(qualified);
        renderTier(under4, `Under ${TIER_MAIN} km`);
        renderTier(under3, `Under ${TIER_MID} km`);
        renderTier(under2, `Under ${TIER_LOW} km`);
      }

      function renderTop3(data) {
        const slots = [
          { cls: 'top2', rank: 2 },
          { cls: 'top1', rank: 1 },
          { cls: 'top3p', rank: 3 }
        ];

        slots.forEach(slot => {
          const runner = data[slot.rank - 1] || null;
          const card = document.createElement('div');
          card.className = `top-card ${slot.cls}`;

          if (!runner) {
            card.innerHTML = `
              <div class="avatar-wrap"><div class="avatar">—</div></div>
              <p class="t-name">—</p>
            `;
            top3El.appendChild(card);
            return;
          }

          const isTop1 = slot.rank === 1;

          card.innerHTML = `
            <div class="avatar-wrap" role="button" tabindex="0" aria-label="View ${runner.member_name}'s stats">
              ${isTop1 ? `
                <div class="crown">
                  <svg viewBox="0 0 24 24"><path d="M12 2l3 6 6 .5-4.5 4 1.6 6-6.1-3.4L5.9 18.5l1.6-6L3 8.5 9 8z"/></svg>
                </div>` : ''}
              <div class="avatar">${Utils.initials(runner.member_name)}</div>
              <div class="rank-chip">#${slot.rank}</div>
            </div>
            <p class="t-name" title="${runner.member_name}">${runner.member_name}</p>
            <div class="t-score">${Utils.formatPace(runner.pace)} /km</div>
            <div class="t-dist">${runner.totalDist.toFixed(2)} km</div>
          `;

          const wrap = card.querySelector('.avatar-wrap');
          wrap.addEventListener('click', () => openRunner(runner));
          wrap.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openRunner(runner);
            }
          });

          top3El.appendChild(card);
        });
      }

      function renderList(data) {
        data.forEach((r, i) => {
          const rank = i + 1;
          const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
          const row = document.createElement('div');
          row.className = rank <= 3 ? 'row top-rank' : 'row';
          row.setAttribute('role', 'button');
          row.setAttribute('tabindex', '0');

          const { mins, secs } = splitTime(r.totalTime);

          row.innerHTML = `
            <div class="r-rank">${medal}</div>
            <div class="r-who">
              <strong>${r.member_name}</strong>
              <small>${r.totalDist.toFixed(2)} km · ${mins}m ${secs}s</small>
            </div>
            <div class="r-right">
              <div class="score">${Utils.formatPace(r.pace)}<span class="score-unit"> /km</span></div>
              <div class="lbl">Avg Pace</div>
            </div>
          `;

          row.addEventListener('click', () => openRunner(r));
          row.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openRunner(r);
            }
          });

          listEl.appendChild(row);
        });
      }

      function renderTier(runners, label) {
        if (!runners.length) return;

        const divider = document.createElement('div');
        divider.className = 'unqualified-divider';
        divider.innerHTML = `<span>${label}</span>`;
        listEl.appendChild(divider);

        runners.forEach(r => {
          const row = document.createElement('div');
          row.className = 'row row-unqualified';
          row.setAttribute('role', 'button');
          row.setAttribute('tabindex', '0');

          const { mins, secs } = splitTime(r.totalTime);

          row.innerHTML = `
            <div class="r-rank r-rank-lock">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="rgba(17,20,28,.35)">
                <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zM12 17a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/>
              </svg>
            </div>
            <div class="r-who">
              <strong>${r.member_name}</strong>
              <small>${r.totalDist.toFixed(2)} km · ${mins}m ${secs}s</small>
            </div>
            <div class="r-right">
              <div class="score score-muted">${Utils.formatPace(r.pace)}<span class="score-unit"> /km</span></div>
              <div class="lbl">Avg Pace</div>
            </div>
          `;

          row.addEventListener('click', () => openRunner(r));
          row.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openRunner(r);
            }
          });

          listEl.appendChild(row);
        });
      }

      function openRunner(runner) {
        const allRuns = allActivityData
          .filter(r => r.member_name === runner.member_name)
          .sort((a, b) => a.event_date.localeCompare(b.event_date));

        const ev = allEvents.find(e => String(e.event_id) === selectedEventId);
        const eventName = ev ? ev.event_name : 'Event';
        const { mins, secs } = splitTime(runner.totalTime);

        document.getElementById('modalTitle').textContent = runner.member_name;
        document.getElementById('modalSub').textContent = `${eventName} · Performance`;
        document.getElementById('mScore').textContent = `${Utils.formatPace(runner.pace)} /km`;
        document.getElementById('mKm').textContent = `${runner.totalDist.toFixed(2)} km`;
        document.getElementById('mDays').textContent = `${mins}m ${secs}s`;
        document.getElementById('mBest').textContent = String(runner.allTimeRuns);

        renderChart(allRuns, selectedEventId);

        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }

      function renderChart(runs, highlightEventId) {
        const labels = runs.map(r => Utils.fmtDateShort ? Utils.fmtDateShort(r.event_date) : r.event_date);
        const paceVals = runs.map(r => Utils.parsePace(r.avg_pace));
        const minPace = Math.min(...paceVals);

        const ctx = document.getElementById('runnerChart');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              label: 'Pace',
              data: paceVals,
              borderColor: 'rgba(255,193,7,0.95)',
              backgroundColor: 'rgba(255,193,7,0.10)',
              fill: true,
              tension: 0.35,
              pointRadius: 6,
              pointHoverRadius: 8,
              pointBackgroundColor: runs.map((r, i) => {
                if (String(r.event_id) === String(highlightEventId)) return '#ffc107';
                return paceVals[i] === minPace ? '#2a9d5c' : 'rgba(255,193,7,0.60)';
              }),
              pointBorderColor: '#fff',
              pointBorderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => ` ${Utils.formatPace(ctx.raw)} /km`,
                  afterLabel: ctx => String(runs[ctx.dataIndex].event_id) === String(highlightEventId) ? ' ← this event' : ''
                }
              }
            },
            scales: {
              x: {
                grid: { color: 'rgba(17,20,28,0.05)' },
                ticks: { color: 'rgba(17,20,28,0.60)', font: { weight: 700, size: 11 } }
              },
              y: {
                reverse: true,
                min: minPace - 0.3,
                max: Math.max(...paceVals) + 0.3,
                grid: { color: 'rgba(17,20,28,0.05)' },
                ticks: {
                  color: 'rgba(17,20,28,0.60)',
                  font: { weight: 700, size: 11 },
                  callback: val => Utils.formatPace(val)
                }
              }
            }
          }
        });
      }

      function closeModal() {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }

      function splitTime(totalMinutes) {
        const mins = Math.floor(totalMinutes);
        const secs = Math.round((totalMinutes - mins) * 60).toString().padStart(2, '0');
        return { mins, secs };
      }

      function showLoading(msg) {
        top3El.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;color:rgba(255,255,255,.65);padding:30px 0;font-weight:600">
            <div class="spinner"></div>
            <p style="margin-top:12px;font-size:13px">${msg}</p>
          </div>
        `;
      }

      function showError(msg) {
        top3El.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;color:rgba(255,100,100,.85);padding:30px 20px;font-weight:700">
            ⚠️ ${msg}
            <br>
            <button type="button" id="retryBtn" style="margin-top:16px;padding:10px 20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:999px;cursor:pointer;font-weight:800;text-transform:uppercase;font-size:11px;letter-spacing:.1em">
              Retry
            </button>
          </div>
        `;
        const btn = document.getElementById('retryBtn');
        if (btn) btn.addEventListener('click', () => location.reload());
      }

      async function init() {
        eventPill.addEventListener('click', toggleDropdown);
        eventPill.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggleDropdown();
          }
        });

        document.addEventListener('click', e => {
          if (!document.getElementById('eventPickerWrap').contains(e.target)) closeDropdown();
        });

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', e => {
          if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
        });

        showLoading('Loading data…');

        try {
          const [activityData, events] = await Promise.all([
            window.IronflowData.fetch({
              onProgress: msg => showLoading(msg),
              onError: (msg, isCritical) => { if (isCritical) showError(msg); }
            }),
            fetchEvents()
          ]);

          allActivityData = activityData;
          allEvents = events;

          buildDropdown(events);

          top3El.innerHTML = `
            <div class="pick-prompt">
              <p class="pick-prompt-title">Choose an Event</p>
              <p class="pick-prompt-sub">Select an event above to see the pace leaderboard</p>
              <span class="pick-prompt-arrow">↑</span>
            </div>
          `;

          const hash = window.location.hash.replace('#event-', '');
          if (hash && events.find(e => String(e.event_id) === hash)) {
            selectEvent(hash);
          }
        } catch (err) {
          console.error('[EventLB] Init failed:', err);
          showError('Could not load data. Check your connection and try again.');
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
  <script src="/assets/js/components.js"></script>
