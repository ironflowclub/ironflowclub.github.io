<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Badminton · IRON FLOW CLUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<!-- Site stylesheets (for the navbar) -->
<link rel="stylesheet" href="assets/css/main.css"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  background:#f5f3ef;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 20px 56px;
}
.wrap{width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center;}
.eyebrow{
  font-family:'Outfit',sans-serif;
  font-weight:800;
  font-size:11px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:rgba(161,115,0,.85);
  margin-bottom:18px;
  align-self:flex-start;
}
.big-title{
  font-family:'Outfit',sans-serif;
  font-weight:900;
  font-size:clamp(48px,13vw,76px);
  line-height:.95;
  letter-spacing:-.03em;
  color:rgba(17,20,28,.92);
  align-self:flex-start;
  margin-bottom:6px;
}
.big-title .stroke{
  -webkit-text-stroke:2px rgba(17,20,28,.92);
  color:transparent;
}
.ruled{
  width:100%;
  height:2px;
  background:rgba(17,20,28,.10);
  margin:28px 0;
  position:relative;
}
.ruled::after{
  content:'';
  position:absolute;
  left:0;top:0;
  height:100%;
  width:52px;
  background:#F2C51D;
}
.msg{
  align-self:flex-start;
  max-width:34ch;
  font-size:16px;
  font-weight:500;
  color:rgba(17,20,28,.60);
  line-height:1.7;
  margin-bottom:40px;
}
.msg strong{color:rgba(17,20,28,.88);font-weight:600;}
.racket-wrap{align-self:flex-end;margin:-20px 0 32px;opacity:.18;}
.back-link{
  align-self:flex-start;
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-family:'Outfit',sans-serif;
  font-weight:800;
  font-size:13px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:rgba(17,20,28,.92);
  text-decoration:none;
  padding:14px 22px;
  border:1.5px solid rgba(17,20,28,.15);
  border-radius:100px;
  transition:border-color .2s, background .2s;
}
.back-link:hover{background:rgba(17,20,28,.04);border-color:rgba(17,20,28,.30);}
.back-link svg{transition:transform .2s}
.back-link:hover svg{transform:translateX(-3px)}
.foot{
  margin-top:56px;
  font-size:10px;
  font-weight:700;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:rgba(17,20,28,.28);
}
</style>
</head>
<body>
  <!-- MAINTENANCE CONTENT -->
  <div class="wrap">

        <line x1="31" y1="9" x2="31" y2="106" stroke="rgba(17,20,28,1)" stroke-width="1.2"/>
        <line x1="43" y1="9" x2="43" y2="108" stroke="rgba(17,20,28,1)" stroke-width="1.2"/>
        <line x1="55" y1="8" x2="55" y2="108" stroke="rgba(17,20,28,1)" stroke-width="1.2"/>

      </svg>
    </div>

    <p class="msg">
      This page is currently <strong>under maintenance.</strong><br>
      We're working on it — check back soon.
    </p>

    <a class="back-link" href="index.html">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      Back to home

    <p class="foot">© 2026 Iron Flow Club · Sharjah, UAE</p>

  </div>

</html>
