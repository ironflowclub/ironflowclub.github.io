  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="/assets/images/favicon-96x96.png?v=2" sizes="96x96" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png?v=2" />

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(r => r.update()).catch(() => {});
    }
  </script>
  
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="IRONFLOW CLUB Sharjah — Leaderboard" />
  <meta name="theme-color" content="#F2C51D" />
  <title>Leaderboard · IRONFLOW CLUB Sharjah</title>

    <!-- Security -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />


  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ironflowclub.github.io/leaderboard.html" />
  <meta property="og:title" content="Leaderboard · IRONFLOW CLUB" />
  <meta property="og:description" content="Monthly running leaderboard — Consistency, Distance, Pace" />
  <meta property="og:image" content="https://ironflowclub.github.io/assets/images/logo.png" />

  <!-- Security -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/assets/css/theme.css" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/leaderboard.css" />

</head>

<body>

  <header>
    <div class="container nav">
      <a class="brand" href="index.html">
        <div class="brand-text">
          <strong>IRON FLOW CLUB</strong>
          <small>Running</small>
        </div>
      </a>
      <div class="nav-actions">
        <a class="nav-home-btn" href="index.html" aria-label="Go to homepage">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/>
            <path d="M9 21V12h6v9"/>
          </svg>
          <span>Home</span>
        </a>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="lb-shell enter" style="animation-delay:60ms">
        <div class="lb-hero">
          <div class="lb-hero-inner">

            <!-- Top bar: title + month filter -->
            <div class="lb-topbar">
              <h1 class="lb-title">Leaderboard</h1>
              <div class="month-pill">
                <span class="sr-only">Month</span>
                <select id="monthSelect" aria-label="Select month"></select>
              </div>
            </div>      

            <!-- Tabs -->
            <div class="lb-tabs" role="tablist">
              <button class="lb-tab active" data-tab="consistent" role="tab" aria-selected="true">
        
                <span class="tab-label">Consistent</span>
              </button>
              <button class="lb-tab" data-tab="distance" role="tab" aria-selected="false">
                
                <span class="tab-label">Distance</span>
              </button>
              <button class="lb-tab" data-tab="pace" role="tab" aria-selected="false">
                
                <span class="tab-label">Pace</span>
              </button>
            </div>

            <!-- Podium -->
            <div class="top3" id="top3">
              <div class="state-msg" style="grid-column:1/-1;padding:40px 0">
                <div class="spinner"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- List sheet -->
        <div class="sheet">
          <div class="list" id="list"></div>
        </div>

      </section>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h2 class="modal-title" id="modalTitle">Runner</h2>
          <p class="modal-sub" id="modalSub"></p>
        </div>
        <button class="icon-btn" id="closeModal" type="button" aria-label="Close">
          <svg viewBox="0 0 24 24">
            <path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.29 19.71 2.88 18.29 9.17 12 2.88 5.71 4.29 4.29l6.3 6.3 6.3-6.3z"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="stats">
          <div class="stat">
            <div class="k">Avg Pace</div>
            <div class="v" id="mScore">—</div>
          </div>
          <div class="stat">
            <div class="k">Distance</div>
            <div class="v" id="mKm">—</div>
          </div>
          <div class="stat">
            <div class="k">Runs</div>
            <div class="v" id="mDays">—</div>
          </div>
          <div class="stat">
            <div class="k">Best Pace</div>
            <div class="v" id="mBest">—</div>
          </div>
        </div>
        <div class="chart">
          <div class="chart-head">
            <strong>Pace Over Time</strong>
            <span style="font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(17,20,28,.55)">
              Lower = Faster
            </span>
          </div>
          <div class="chart-wrap">
            <canvas id="runnerChart" aria-label="Pace chart" role="img"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="assets/js/data-handler.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/leaderboard.js"></script>
  <script src="assets/js/components.js"></script>

  

</body>
</html>
